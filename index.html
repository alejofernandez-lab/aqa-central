// ── Helpers ───────────────────────────────────────────────────────────
const splitCSV = line => {
  const cols = []; let cur = "", inQ = false;
  for (let ch of line) {
    if (ch === '"') { inQ = !inQ; continue; }
    if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ""; continue; }
    cur += ch;
  }
  cols.push(cur.trim());
  return cols;
};
const parseGeneric = text => {
  const lines = text.trim().split("\n");
  if (lines.length < 2) return { headers: [], rows: [] };
  const headers = splitCSV(lines[0]).map(h => h.replace(/"/g,"").trim());
  const rows = lines.slice(1).map(line => {
    const cols = splitCSV(line);
    const row = {};
    headers.forEach((h,i) => row[h] = cols[i]||"");
    return row;
  }).filter(r => Object.values(r).some(v => v));
  return { headers, rows };
};
const parseNum = s => parseFloat((s||"").replace(/[^0-9,-]/g,"").replace(/\./g,"").replace(",",".")) || 0;
const parseEstado = s => {
  const sl = (s||"").toLowerCase();
  if (sl.includes("inhabilitado")) return "inhabilitado";
  if (sl.includes("pendiente") || sl.includes("facturas")) return "pendiente";
  return "habilitado";
};
const parseCob = (text, cartera) => {
  const lines = text.trim().split("\n");
  if (lines.length < 2) return [];
  return lines.slice(1).map(line => {
    const c = splitCSV(line);
    const [asesorCob,id,modelo,abono,nombre,,,deudaRaw,fcRaw,mensRaw,adicRaw] = c;
    if (!id?.trim() || !nombre?.trim()) return null;
    return { id:id.trim(), nombre:nombre.trim(), modelo:modelo||"", asesorCob:asesorCob||"",
      abono:parseNum(abono), estado:parseEstado(adicRaw), deuda:parseNum(deudaRaw),
      fc:parseInt(fcRaw)||0, mens:parseInt(mensRaw)||0, cartera };
  }).filter(Boolean);
};
const safeFetch = url => fetch(url).then(r => { if(!r.ok) throw new Error(); return r.text(); });

const numLetras = n => {
  if(!n||n===0) return "cero";
  const M={1:"uno",2:"dos",3:"tres",4:"cuatro",5:"cinco",6:"seis",7:"siete",8:"ocho",9:"nueve",10:"diez",11:"once",12:"doce",13:"trece",14:"catorce",15:"quince",16:"dieciséis",17:"diecisiete",18:"dieciocho",19:"diecinueve",20:"veinte",21:"veintiún",22:"veintidós",23:"veintitrés",24:"veinticuatro",25:"veinticinco",26:"veintiséis",27:"veintisiete",28:"veintiocho",29:"veintinueve",30:"treinta",40:"cuarenta",50:"cincuenta",60:"sesenta",70:"setenta",80:"ochenta",90:"noventa"};
  if(n<=29) return M[n]||"";
  if(n<100){const d=Math.floor(n/10)*10,u=n%10;return u===0?M[d]:M[d]+" y "+M[u];}
  if(n===100) return "cien";
  if(n<200) return "ciento "+numLetras(n-100);
  const C={200:"doscientos",300:"trescientos",400:"cuatrocientos",500:"quinientos",600:"seiscientos",700:"setecientos",800:"ochocientos",900:"novecientos"};
  const cv=Math.floor(n/100)*100,r=n%100;
  if(n<1000) return r===0?C[cv]:C[cv]+" "+numLetras(r);
  const m2=Math.floor(n/1000),r2=n%1000;
  const ms=m2===1?"mil":numLetras(m2)+" mil";
  return r2===0?ms:ms+" "+numLetras(r2);
};

        React.createElement('div',{style:{display:"flex",flexDirection:"column",gap:5}},
          ...filtered.map((c,i)=>{
            const av=avColor(c.asesorCob);
            const open=expanded?.id===c.id&&expanded?.n===c.nombre;
            return React.createElement('div',{key:c.id+i,onClick:()=>setExpanded(open?null:{id:c.id,n:c.nombre}),style:{background:"#fff",border:"1px solid #dce6f5",borderRadius:12,padding:"10px 14px",cursor:"pointer",borderLeft:`3px solid ${BCOL[c.estado]||"#ccc"}`}},
              React.createElement('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}},
                React.createElement('div',{style:{display:"flex",alignItems:"center",gap:10,minWidth:0}},
                  React.createElement('div',{style:{width:28,height:28,borderRadius:"50%",background:av.bg,color:av.c,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,flexShrink:0}},initials(c.asesorCob)),
                  React.createElement('div',{style:{minWidth:0}},
                    React.createElement('p',{style:{margin:0,fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},c.nombre),
                    React.createElement('p',{style:{margin:0,fontSize:11,color:"#6b7a99"}},`ID ${c.id} · ${c.modelo} · ${c.cartera}`)
                  )
                ),
                React.createElement('div',{style:{display:"flex",alignItems:"center",gap:8,flexShrink:0}},
                  React.createElement(Badge,{estado:c.estado}),
                  React.createElement('span',{style:{fontSize:11,color:c.deuda>500000?"#791F1F":c.deuda>0?"#633806":"#6b7a99",fontWeight:c.deuda>500000?600:400,whiteSpace:"nowrap"}},fmt(c.deuda))
                )
              ),
              open&&React.createElement('div',{style:{marginTop:10,paddingTop:10,borderTop:"1px solid #dce6f5",display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:6}},
                ...[{l:"Modelo",v:c.modelo||"—"},{l:"Abono s/IVA",v:c.abono>0?fmt(c.abono):"—"},{l:"Deuda",v:fmt(c.deuda)},{l:"FC pendientes",v:c.fc},{l:"Mensualidades",v:c.mens},{l:"Asesor cobr.",v:c.asesorCob||"—"}].map(({l,v})=>
                  React.createElement('div',{key:l,style:{background:"#f4f7fb",borderRadius:8,padding:"7px 10px"}},
                    React.createElement('p',{style:{margin:0,fontSize:10,color:"#6b7a99"}},l),
                    React.createElement('p',{style:{margin:0,fontSize:13,fontWeight:500}},v)
                  )
                )
              )
            );
          })
        )
      )
    ),

    // ── Resumen Cobranzas ──
    tab==="Resumen Cobranzas"&&React.createElement('div',{style:{display:"flex",flexDirection:"column",gap:10}},
      React.createElement('div',{style:{background:"#f4f7fb",borderRadius:12,padding:"1rem",border:"1px solid #dce6f5"}},
        React.createElement('p',{style:{margin:"0 0 4px",fontSize:12,color:"#6b7a99"}},"Deuda total cartera"),
        React.createElement('p',{style:{margin:0,fontSize:24,fontWeight:600,color:"#791F1F"}},fmt(stats.deudaTotal)),
        React.createElement('p',{style:{margin:"4px 0 0",fontSize:11,color:"#6b7a99"}},`sobre ${stats.total} clientes`)
      ),
      ...resumen.map(r=>React.createElement('div',{key:r.cob,style:{background:"#fff",border:"1px solid #dce6f5",borderRadius:12,padding:"12px 16px"}},
        React.createElement('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
          React.createElement('p',{style:{margin:0,fontSize:14,fontWeight:500}},r.cob),
          React.createElement('p',{style:{margin:0,fontSize:13,fontWeight:600,color:"#791F1F"}},fmt(r.deuda))
        ),
        React.createElement('div',{style:{display:"flex",gap:5,flexWrap:"wrap"}},
          React.createElement('span',{style:{background:"#FCEBEB",color:"#791F1F",fontSize:11,padding:"2px 8px",borderRadius:6}},`${r.inhabilitado||0} inhab.`),
          React.createElement('span',{style:{background:"#FAEEDA",color:"#633806",fontSize:11,padding:"2px 8px",borderRadius:6}},`${r.pendiente||0} pend.`),
          React.createElement('span',{style:{background:"#EAF3DE",color:"#27500A",fontSize:11,padding:"2px 8px",borderRadius:6}},`${r.habilitado||0} hab.`),
          React.createElement('span',{style:{background:"#f4f7fb",color:"#6b7a99",fontSize:11,padding:"2px 8px",borderRadius:6}},`${r.total} total`)
        )
      ))
    ),

    // ── Pipeline Comercial ──
    tab==="Pipeline Comercial"&&React.createElement(PipelineComercial,{onNuevoCierre:handleNuevoCierre}),

    // ── Logística ──
    tab==="Logística"&&React.createElement('div',{style:{background:"#f4f7fb",borderRadius:12,padding:"1.25rem",border:"1px solid #dce6f5"}},
      React.createElement('p',{style:{margin:"0 0 4px",fontSize:14,fontWeight:500}},"Próximamente"),
      React.createElement('p',{style:{margin:0,fontSize:13,color:"#6b7a99"}},"Pedidos de CO2, botellas, tapas, relevos e instalaciones.")
    ),

    // ── Administración ──
    tab==="Administración"&&React.createElement('div',null,
      React.createElement(TabBar,{tabs:ADM_TABS,active:admTab,onChange:setAdmTab,color:"#1F3864"}),
      admTab==="Generador de Contratos"&&React.createElement(GeneradorContratos,null),
      ["Intimaciones","Cartas Documento","Veraz"].includes(admTab)&&(
        loadingAdm
          ?React.createElement('div',{style:{padding:"2rem",textAlign:"center",fontSize:13,color:"#6b7a99"}},"Cargando...")
          :admData[admTab]&&React.createElement('div',null,
            React.createElement('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
              React.createElement('span',{style:{background:ADM_COLORS[admTab]+"22",color:ADM_COLORS[admTab],borderRadius:8,padding:"4px 12px",fontSize:12,fontWeight:500}},`${admData[admTab].rows.length} registros · ${admTab}`),
              React.createElement('button',{onClick:()=>setAdmData(p=>{const n={...p};delete n[admTab];return n;}),style:{fontSize:11,padding:"4px 12px",borderRadius:8,border:"1px solid #dce6f5",cursor:"pointer",background:"transparent",color:"#6b7a99"}},"↻ Actualizar")
            ),
            React.createElement(GenericTable,{data:admData[admTab],headerBg:ADM_COLORS[admTab]})
          )
      ),
      admTab==="Score Crediticio"&&React.createElement('div',null,
        React.createElement(TabBar,{tabs:["Buenos Aires","Interior","Hielogic"],active:scoreTab,onChange:setScoreTab,color:"#1a5c3a"}),
        loadingAdm
          ?React.createElement('div',{style:{padding:"2rem",textAlign:"center",fontSize:13,color:"#6b7a99"}},"Cargando score...")
          :admData["Score Crediticio"]?.[scoreTab]&&React.createElement('div',null,
            React.createElement('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
              React.createElement('span',{style:{background:"#e6f7f1",color:"#1a5c3a",borderRadius:8,padding:"4px 12px",fontSize:12,fontWeight:500}},`${admData["Score Crediticio"][scoreTab].rows.length} clientes · ${scoreTab}`),
              React.createElement('button',{onClick:()=>setAdmData(p=>{const n={...p};delete n["Score Crediticio"];return n;}),style:{fontSize:11,padding:"4px 12px",borderRadius:8,border:"1px solid #dce6f5",cursor:"pointer",background:"transparent",color:"#6b7a99"}},"↻ Actualizar")
            ),
            React.createElement(ScoreTable,{data:admData["Score Crediticio"][scoreTab]})
          )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
