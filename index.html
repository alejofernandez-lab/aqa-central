// ── Helpers ───────────────────────────────────────────────────────────
const splitCSV = line => {
  const cols=[]; let cur="",inQ=false;
  for(let ch of line){
    if(ch==='"'){inQ=!inQ;continue;}
    if(ch===','&&!inQ){cols.push(cur.trim());cur="";continue;}
    if((ch==='\n'||ch==='\r')&&inQ){cur+=' ';continue;} // salto de línea dentro de celda
    cur+=ch;
  }
  cols.push(cur.trim()); return cols;
};

const parseGeneric = text => {
  // Reagrupar líneas respetando comillas (celdas con saltos de línea internos)
  const clean = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  const logicalLines = [];
  let current = "", inQ = false;
  for(let i=0;i<clean.length;i++){
    const ch=clean[i];
    if(ch==='"'){inQ=!inQ;current+=ch;}
    else if(ch==='\n'&&!inQ){logicalLines.push(current);current="";}
    else{current+=ch;}
  }
  if(current) logicalLines.push(current);
  if(logicalLines.length<2) return {headers:[],rows:[]};
  const headers=splitCSV(logicalLines[0]).map(h=>h.replace(/"/g,"").trim()).filter(h=>h);
  const rows=logicalLines.slice(1).map(line=>{
    const cols=splitCSV(line);
    const row={};
    headers.forEach((h,i)=>row[h]=(cols[i]||"").trim());
    return row;
  }).filter(r=>Object.values(r).some(v=>v&&v.trim()));
  return {headers,rows};
};
const parseNum = s => parseFloat((s||"").replace(/[^0-9,-]/g,"").replace(/\./g,"").replace(",","."))||0;
const parseEstado = (f,g) => {
  const c=s=>{const sl=(s||"").toLowerCase();if(sl.includes("inhabilitado"))return"inhabilitado";if(sl.includes("facturas")||sl.includes("pendiente"))return"pendiente";return"habilitado";};
  const ef=c(f),eg=c(g);
  if(ef==="inhabilitado"||eg==="inhabilitado")return"inhabilitado";
  if(ef==="pendiente"||eg==="pendiente")return"pendiente";
  return"habilitado";
};
const parseCob = (text,cartera) => {
  const lines=text.trim().split("\n");
  if(lines.length<2)return[];

    const[asesorCob,id,modelo,abono,nombre,colF,colG,deudaRaw,fcRaw,mensRaw]=c;

    return{id:id.trim(),nombre:nombre.trim(),modelo:modelo||"",asesorCob:asesorCob||"",abono:parseNum(abono),estado:parseEstado(colF,colG),deuda:parseNum(deudaRaw),fc:parseInt(fcRaw)||0,mens:parseInt(mensRaw)||0,cartera,asesorAtClte:"",fechaInstalacion:""};
  }).filter(Boolean);
};
  // Parsea Comodato para extraer asesor At. Cliente (col A), fecha instalación (col I), nombre fantasía (col D), ID Persat (col E)

  const lines=text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").trim().split("\n");
  if(lines.length<2)return{map:{},clientes:[]};

};

const numLetras=n=>{
  if(!n||n===0)return"cero";
  const M={1:"uno",2:"dos",3:"tres",4:"cuatro",5:"cinco",6:"seis",7:"siete",8:"ocho",9:"nueve",10:"diez",11:"once",12:"doce",13:"trece",14:"catorce",15:"quince",16:"dieciséis",17:"diecisiete",18:"dieciocho",19:"diecinueve",20:"veinte",21:"veintiún",22:"veintidós",23:"veintitrés",24:"veinticuatro",25:"veinticinco",26:"veintiséis",27:"veintisiete",28:"veintiocho",29:"veintinueve",30:"treinta",40:"cuarenta",50:"cincuenta",60:"sesenta",70:"setenta",80:"ochenta",90:"noventa"};
  if(n<=29)return M[n]||"";
  if(n<100){const d=Math.floor(n/10)*10,u=n%10;return u===0?M[d]:M[d]+" y "+M[u];}
  if(n===100)return"cien";
  if(n<200)return"ciento "+numLetras(n-100);
  const C={200:"doscientos",300:"trescientos",400:"cuatrocientos",500:"quinientos",600:"seiscientos",700:"setecientos",800:"ochocientos",900:"novecientos"};
  const cv=Math.floor(n/100)*100,r=n%100;
  if(n<1000)return r===0?C[cv]:C[cv]+" "+numLetras(r);
  const m2=Math.floor(n/1000),r2=n%1000;
  const ms=m2===1?"mil":numLetras(m2)+" mil";
  return r2===0?ms:ms+" "+numLetras(r2);
};
