*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f7fb;color:#1a2340;min-height:100vh}
input,select,textarea{font-family:inherit}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}

.kanban-card{background:#fff;border-radius:9px;padding:10px 11px;margin-bottom:7px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:3px solid #dce6f5;cursor:grab;user-select:none;transition:box-shadow .15s}
.kanban-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.13)}
.kanban-card.dragging{opacity:.4}
.kanban-card-name{font-size:12px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kanban-card-meta{font-size:10px;color:#6b7a99;line-height:1.6}
.kanban-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:5px;font-weight:600;margin-top:3px}
.add-btn{width:100%;background:none;border:1.5px dashed #c5d3e8;border-radius:7px;padding:7px;font-size:11px;color:#9baabf;cursor:pointer;margin-top:3px;transition:all .15s}
.add-btn:hover{background:#e8eef8;border-color:#8a3a00;color:#8a3a00}

function DireccionAutocomplete({value, onChange, SS}){
  const inputRef=useRef(null);
  const autocompleteRef=useRef(null);
  useEffect(()=>{
    if(!inputRef.current||!window.google)return;
    const ac=new window.google.maps.places.Autocomplete(inputRef.current,{
      componentRestrictions:{country:["ar","uy"]},
      fields:["formatted_address","geometry"]
    });
    autocompleteRef.current=ac;
    ac.addListener("place_changed",()=>{
      const place=ac.getPlace();
      if(place.formatted_address){onChange(place.formatted_address);}
    });
    return()=>window.google.maps.event.clearInstanceListeners(ac);
  },[]);
  return(
    <input
      ref={inputRef}
      value={value||""}
      onChange={e=>onChange(e.target.value)}
      placeholder="Ej: Av. Corrientes 1234, CABA"
      style={SS}
    />
  );
}

function ModalTipoBotellas({cantActual,tipoActual,onConfirm,onClose}){
  const[cant,setCant]=useState(cantActual||"");
  const[tipo,setTipo]=useState(tipoActual||"");
  const tipos=["Flauta","Petisa","Oliva"];
  return(
    <div className="overlay" onClick={e=>{if(e.target.className==="overlay")onClose();}}>
      <div className="modal" style={{maxWidth:360}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <p style={{margin:0,fontSize:15,fontWeight:600}}>🍾 Insumos — Botellas</p>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#6b7a99"}}>✕</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div>
            <label style={{fontSize:11,fontWeight:600,color:"#6b7a99",textTransform:"uppercase",display:"block",marginBottom:6}}>Cantidad</label>
            <input type="number" value={cant} onChange={e=>setCant(e.target.value)} placeholder="Ej: 20" style={{fontSize:13,padding:"9px 12px",borderRadius:8,border:"1.5px solid #dce6f5",background:"#f4f7fb",color:"#1a2340",outline:"none",width:"100%"}}/>
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:600,color:"#6b7a99",textTransform:"uppercase",display:"block",marginBottom:6}}>Tipo de botella</label>
            <div style={{display:"flex",gap:8}}>
              {tipos.map(t=>(
                <button key={t} onClick={()=>setTipo(t)} style={{flex:1,padding:"10px 8px",borderRadius:8,border:`2px solid ${tipo===t?"#1F3864":"#dce6f5"}`,background:tipo===t?"#1F3864":"#fff",color:tipo===t?"white":"#1a2340",fontSize:13,fontWeight:tipo===t?600:400,cursor:"pointer"}}>
                  {t}
                </button>
              ))}
            </div>
          </div>
          <button onClick={()=>{if(!cant||!tipo){alert("Completá cantidad y tipo");return;}onConfirm(cant,tipo);onClose();}} style={{background:"#1F3864",color:"white",border:"none",borderRadius:10,padding:"12px",fontSize:13,fontWeight:600,cursor:"pointer",marginTop:4}}>
            ✔ Confirmar
          </button>
        </div>
      </div>
    </div>
  );
}

function CadenaInput({value,onChange,cadenas}){
  const[inputVal,setInputVal]=useState(value||"");
  const[showSugg,setShowSugg]=useState(false);
  const sugerencias=useMemo(()=>{
    if(!inputVal.trim())return cadenas;

  },[inputVal,cadenas]);
  const SS={fontSize:13,padding:"9px 12px",borderRadius:8,border:"1.5px solid #dce6f5",background:"#f4f7fb",color:"#1a2340",outline:"none",width:"100%"};

  const seleccionar=(cadena)=>{
    setInputVal(cadena);
    onChange(cadena);
    setShowSugg(false);
  };

  const handleChange=(e)=>{
    const v=e.target.value;
    setInputVal(v);
    onChange(v);
    setShowSugg(true);
  };

  const handleBlur=()=>setTimeout(()=>setShowSugg(false),150);

  return(
    <div style={{marginBottom:14,position:"relative"}}>
      <div style={{background:"#f0f4ff",borderRadius:10,padding:"10px 14px",border:"1px solid #c5d3f0"}}>
        <p style={{margin:"0 0 8px",fontSize:12,fontWeight:600,color:"#1F3864"}}>🔗 Acuerdo Correlativo</p>
        <p style={{margin:"0 0 6px",fontSize:11,color:"#6b7a99"}}>Si este local pertenece a una cadena, escribí el nombre. Los datos se pre-llenan automáticamente.</p>
        <input
          value={inputVal}
          onChange={handleChange}
          onFocus={()=>setShowSugg(true)}
          onBlur={handleBlur}
          placeholder="Ej: Club de la Milanesa"
          style={SS}
        />
        {inputVal&&<button onClick={()=>{setInputVal("");onChange("");}} style={{background:"none",border:"none",fontSize:11,color:"#dc3545",cursor:"pointer",marginTop:4,padding:0}}>✕ Quitar cadena</button>}
        {showSugg&&sugerencias.length>0&&(
          <div style={{position:"absolute",left:14,right:14,background:"#fff",border:"1px solid #dce6f5",borderRadius:8,boxShadow:"0 4px 16px rgba(0,0,0,.1)",zIndex:9999,marginTop:4,maxHeight:160,overflowY:"auto"}}>
            {sugerencias.map(c=>(
              <button key={c} onMouseDown={()=>seleccionar(c)} style={{display:"block",width:"100%",textAlign:"left",padding:"8px 12px",border:"none",background:"none",fontSize:13,cursor:"pointer",color:"#1a2340"}}>
                🔗 {c}
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function CierreFormModal({initialForm,editandoId,onGuardar,onCancelar,todosLosCierres}){
  const[form,setForm]=useState({...CIERRE_VACIO,...(initialForm||{})});
  const[modalVendedor,setModalVendedor]=useState(false);
  const[modalProvincia,setModalProvincia]=useState(false);
  const[modalBotellas,setModalBotellas]=useState(false);
  // cadena manejada por CadenaInput
  const setF=(k,v)=>setForm(p=>({...p,[k]:v}));
  const SS={fontSize:13,padding:"9px 12px",borderRadius:8,border:"1.5px solid #dce6f5",background:"#f4f7fb",color:"#1a2340",outline:"none",width:"100%"};
  const inp=(k,ph,type="text")=><input type={type} value={form[k]||""} onChange={e=>setF(k,e.target.value)} placeholder={ph} style={SS}/>;
  const sel=(k,opts,ph="Seleccionar...")=><select value={form[k]||""} onChange={e=>setF(k,e.target.value)} style={{...SS,cursor:"pointer"}}><option value="">{ph}</option>{opts.map(o=><option key={o}>{o}</option>)}</select>;
  const campo=(label,child,full=false)=><div style={{display:"flex",flexDirection:"column",gap:4,gridColumn:full?"1/-1":"auto"}}><label style={{fontSize:11,fontWeight:600,color:"#6b7a99",textTransform:"uppercase",letterSpacing:"0.5px"}}>{label}</label>{child}</div>;

  // Cadenas disponibles para acuerdo correlativo
  const cadenas=useMemo(()=>{
    const s=new Set();
    (todosLosCierres||[]).forEach(c=>{if(c.cadena)s.add(c.cadena);});
    return Array.from(s).sort();
  },[todosLosCierres]);

  const aplicarCadena=(nombreCadena)=>{
    const base=(todosLosCierres||[]).find(c=>c.cadena===nombreCadena);
    if(base){
      setForm(p=>({...p,
        cadena:nombreCadena,
        razonSocial:base.razonSocial||p.razonSocial,
        valor:base.valor||p.valor,
        contrato:base.contrato||p.contrato,
        ajuste:base.ajuste||p.ajuste,
        modelo:base.modelo||p.modelo,
        cantBotellas:base.cantBotellas||p.cantBotellas,
        tipoBotellas:base.tipoBotellas||p.tipoBotellas,
      }));
    } else {
      setF("cadena",nombreCadena);
    }
  };

  const insumosLabel=form.cantBotellas&&form.tipoBotellas?`${form.cantBotellas} × ${form.tipoBotellas}`:"Sin definir";

  const guardar=async()=>{
    if(!form.nombreFantasia){alert("Completá al menos el Nombre de Fantasía");return;}
    await onGuardar(form,editandoId);
  };

  return(
    <div className="overlay" onClick={e=>{if(e.target.className==="overlay")onCancelar();}}>
      <div className="modal" style={{maxWidth:620}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <p style={{margin:0,fontSize:15,fontWeight:600}}>{editandoId?"✏️ Editar Cierre":"+ Nuevo Cierre"}</p>
          <button onClick={onCancelar} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#6b7a99"}}>✕</button>
        </div>
        {modalVendedor&&<ModalLista titulo="Seleccionar Vendedor" items={VENDEDORES} onSelect={v=>setF("vendedor",v)} onClose={()=>setModalVendedor(false)}/>}
        {modalProvincia&&<ModalLista titulo="Seleccionar Provincia" items={PROVINCIAS} onSelect={v=>setF("provincia",v)} onClose={()=>setModalProvincia(false)}/>}
        {modalBotellas&&<ModalTipoBotellas cantActual={form.cantBotellas} tipoActual={form.tipoBotellas} onConfirm={(c,t)=>{setF("cantBotellas",c);setF("tipoBotellas",t);}} onClose={()=>setModalBotellas(false)}/>}


        {/* Acuerdo correlativo */}
        <CadenaInput
          value={form.cadena||""}
          onChange={v=>aplicarCadena(v)}
          cadenas={cadenas}
        />

        <p style={{margin:"0 0 10px",fontSize:12,fontWeight:600,color:"#6b7a99",textTransform:"uppercase"}}>📋 Datos del Cliente</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          {campo("Clasificación",sel("clasificacion",CLASIFICACIONES))}
          {campo("Vendedor",<div style={{display:"flex",gap:6,alignItems:"center"}}><div style={{flex:1,padding:"9px 12px",borderRadius:8,border:"1.5px solid #dce6f5",background:"#f4f7fb",fontSize:13,color:form.vendedor?"#1a2340":"#9baabf",minHeight:38}}>{form.vendedor||"Sin seleccionar"}</div><button onClick={()=>setModalVendedor(true)} style={{background:"#1F3864",color:"white",border:"none",borderRadius:8,padding:"9px 14px",fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>Elegir</button></div>)}
          {campo("Nombre de Fantasía",inp("nombreFantasia","Ej: LOI SUITES"),true)}
          {campo("Razón Social",inp("razonSocial","Ej: LOITEGUI SA"),true)}
          {campo("Dirección",<DireccionAutocomplete value={form.direccion} onChange={v=>setF("direccion",v)} SS={SS}/>,true)}
          {campo("Provincia",<div style={{display:"flex",gap:6,alignItems:"center"}}><div style={{flex:1,padding:"9px 12px",borderRadius:8,border:"1.5px solid #dce6f5",background:"#f4f7fb",fontSize:13,color:form.provincia?"#1a2340":"#9baabf",minHeight:38}}>{form.provincia||"Sin seleccionar"}</div><button onClick={()=>setModalProvincia(true)} style={{background:"#1F3864",color:"white",border:"none",borderRadius:8,padding:"9px 14px",fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>Elegir</button></div>)}
          {campo("Correo",inp("correo","email@ejemplo.com"))}
          {campo("Nombre del Contacto",inp("contactoNombre","Ej: Juan Pérez"))}
          {campo("Cargo",inp("contactoCargo","Ej: Gerente"))}
          {campo("Teléfono",inp("contactoTel","Ej: 11-1234-5678"))}
          {campo("Fecha de Solicitud",inp("fechaSolicitud","","date"))}
          {campo("Estado",<select value={form.estadoCierre||"Pendiente"} onChange={e=>setF("estadoCierre",e.target.value)} style={{...SS,cursor:"pointer"}}><option value="Pendiente">🟡 Pendiente</option><option value="Instalado">🟢 Instalado</option><option value="Baja">🔴 Baja</option></select>)}
        </div>

        <p style={{margin:"0 0 10px",fontSize:12,fontWeight:600,color:"#6b7a99",textTransform:"uppercase"}}>💧 Condiciones Comerciales</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          {campo("Modelo",sel("modelo",MODELOS_ALL))}
          {campo("Valor mensual s/IVA",inp("valor","Ej: $350.000"))}
          {campo("Instalación",inp("instalacion","Ej: Bonificada 100%"))}
          {campo("Insumos — Botellas",
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <div style={{flex:1,padding:"9px 12px",borderRadius:8,border:"1.5px solid #dce6f5",background:"#f4f7fb",fontSize:13,color:form.cantBotellas?"#1a2340":"#9baabf",minHeight:38}}>
                {insumosLabel}
              </div>
              <button onClick={()=>setModalBotellas(true)} style={{background:"#1F3864",color:"white",border:"none",borderRadius:8,padding:"9px 14px",fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>Definir</button>
            </div>
          )}
          {campo("Contrato",inp("contrato","Ej: 24 meses"))}
          {campo("Ajuste",sel("ajuste",AJUSTES))}
          {campo("Observaciones",<textarea value={form.observaciones||""} onChange={e=>setF("observaciones",e.target.value)} rows={2} style={{...SS,resize:"vertical"}}/>,true)}
        </div>

        <button onClick={guardar} style={{width:"100%",background:editandoId?"#1a5c3a":"#1F3864",color:"white",border:"none",borderRadius:10,padding:"13px",fontSize:14,fontWeight:600,cursor:"pointer"}}>
          {editandoId?"✔ Guardar cambios":"✔ Guardar Cierre"}
        </button>
      </div>
    </div>
  );
}

const CIERRE_VACIO={clasificacion:"",nombreFantasia:"",razonSocial:"",direccion:"",provincia:"",correo:"",contactoNombre:"",contactoCargo:"",contactoTel:"",fechaSolicitud:"",modelo:"",valor:"",instalacion:"",cantBotellas:"",tipoBotellas:"",contrato:"",ajuste:"",observaciones:"",asesor:"",vendedor:"",estadoCierre:"Pendiente",cadena:""};
const EMAILS_APP=["clientes@aqa.com.ar","administracion@aqa.com.ar","ventas@aqa.com.ar","ventas@hielogic.com.ar","serviciotecnico@hielogic.com.ar","cobranzas@aqa.com.ar","cobranzas.interior@aqa.com.ar","ignaciom@aqa.com.ar","jagazzi@pwg.com.ar","santiago.puigmarti@aqa.com.ar","facundoc@aqa.com.ar","alejo.fernandez@aqa.com.ar","mateol@aqa.com.ar"];
const EMAILS_ADMIN=["administracion@aqa.com.ar","alejo.fernandez@aqa.com.ar","santiago.puigmarti@aqa.com.ar"];
function Comercial({onNuevoCierre}){
  const fb=useFirebase();
  const{user}=useAuth();
  const esAdmin=user&&EMAILS_ADMIN.includes((user.email||"").toLowerCase());
  const[cierres,setCierres]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showForm,setShowForm]=useState(false);
  const[editandoId,setEditandoId]=useState(null);
  const[initialForm,setInitialForm]=useState(CIERRE_VACIO);
  const[expandedId,setExpandedId]=useState(null);
  const[fVendedor,setFVendedor]=useState("Todos");
  const[fProvincia,setFProvincia]=useState("Todas");
  const[fClasif,setFClasif]=useState("Todas");
  const[fModelo,setFModelo]=useState("Todos");
  const[fAsesorCom,setFAsesorCom]=useState("Todos");
  const[fEstadoCierre,setFEstadoCierre]=useState("Todos");
  const[fCadena,setFCadena]=useState("Todas");
  const[qCom,setQCom]=useState("");
  const[modalAsesor,setModalAsesor]=useState(null);
  const[chatCierreId,setChatCierreId]=useState(null);
  const SS={fontSize:13,padding:"9px 12px",borderRadius:8,border:"1.5px solid #dce6f5",background:"#f4f7fb",color:"#1a2340",outline:"none",width:"100%"};

  useEffect(()=>{if(!fb)return;const{db,collection,query,orderBy,onSnapshot}=fb;const q=query(collection(db,"cierres"),orderBy("ts","desc"));const unsub=onSnapshot(q,snap=>{setCierres(snap.docs.map(d=>({id:d.id,...d.data()})));setLoading(false);});return()=>unsub();},[]);
  useEffect(()=>{if(window._firebase&&loading)setLoading(false);},[fb]);

  const cadenas=useMemo(()=>{const s=new Set();cierres.forEach(c=>{if(c.cadena)s.add(c.cadena);});return Array.from(s).sort();},[cierres]);

  const filteredCierres=useMemo(()=>cierres.filter(c=>{const sq=qCom.toLowerCase();return(c.nombreFantasia||"").toLowerCase().includes(sq)||(c.razonSocial||"").toLowerCase().includes(sq)||(c.vendedor||"").toLowerCase().includes(sq);}).filter(c=>fVendedor==="Todos"||(c.vendedor||"")===fVendedor).filter(c=>fProvincia==="Todas"||(c.provincia||"")===fProvincia).filter(c=>fClasif==="Todas"||(c.clasificacion||"")===fClasif).filter(c=>fModelo==="Todos"||(c.modelo||"")===fModelo).filter(c=>fAsesorCom==="Todos"||(c.asesor||"")===fAsesorCom).filter(c=>fEstadoCierre==="Todos"||(c.estadoCierre||"Pendiente")===fEstadoCierre).filter(c=>fCadena==="Todas"||(c.cadena||"")===fCadena),[cierres,qCom,fVendedor,fProvincia,fClasif,fModelo,fAsesorCom,fEstadoCierre,fCadena]);

  const abrirNuevo=()=>{setEditandoId(null);setInitialForm(CIERRE_VACIO);setShowForm(true);};
  const abrirEdicion=(c)=>{setEditandoId(c.id);setInitialForm({...CIERRE_VACIO,...c});setShowForm(true);setExpandedId(null);};
  const cancelar=()=>{setShowForm(false);setEditandoId(null);};

  const guardar=async(form,eid)=>{
    if(!fb){alert("Firebase no disponible");return;}
    const{db,collection,addDoc,doc,setDoc}=fb;
    if(eid){
      await setDoc(doc(db,"cierres",eid),{...form},{merge:true});
    } else {
      const nuevo={...form,ts:Date.now(),fecha:new Date().toLocaleDateString("es-AR")};
      const ref=await addDoc(collection(db,"cierres"),nuevo);
      onNuevoCierre({...nuevo,id:ref.id});
    }
    cancelar();
  };

  const eliminar=async(id,nombre)=>{
    if(!esAdmin)return;
    if(!confirm(`¿Eliminar "${nombre}"? No se puede deshacer.`))return;
    if(!fb)return;
    const{db,doc,deleteDoc}=fb;
    await deleteDoc(doc(db,"cierres",id));
  };

  const asignarAsesor=async(id,a)=>{if(!fb)return;const{db,doc,setDoc}=fb;await setDoc(doc(db,"cierres",id),{asesor:a},{merge:true});};

  if(loading||!fb)return <div style={{padding:"2rem",textAlign:"center",fontSize:13,color:"#6b7a99"}}>{!fb?"Conectando a Firebase...":"Cargando cierres..."}</div>;

  return(<div>
    {showForm&&<CierreFormModal initialForm={initialForm} editandoId={editandoId} onGuardar={guardar} onCancelar={cancelar} todosLosCierres={cierres}/>}
    {modalAsesor&&<ModalLista titulo="Asignar Asesor At. Cliente" items={ASESORES_ATCLTE} onSelect={a=>asignarAsesor(modalAsesor,a)} onClose={()=>setModalAsesor(null)}/>}
    {chatCierreId&&(()=>{const c=cierres.find(x=>x.id===chatCierreId);return c?<ClienteChat clienteId={`cierre_${chatCierreId}`} clienteNombre={c.nombreFantasia} onClose={()=>setChatCierreId(null)}/>:null;})()}
    
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div><p style={{margin:0,fontSize:14,fontWeight:600}}>Comercial</p><p style={{margin:0,fontSize:12,color:"#6b7a99"}}>{cierres.length} cierres · tiempo real 🟢</p></div>
      <button onClick={abrirNuevo} style={{background:"#1F3864",color:"white",border:"none",borderRadius:10,padding:"9px 18px",fontSize:13,fontWeight:600,cursor:"pointer"}}>+ Nuevo Cierre</button>
    </div>
    <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
      <input placeholder="Buscar cliente..." value={qCom} onChange={e=>setQCom(e.target.value)} style={{...SS,flex:1,minWidth:140}}/>
      <select value={fEstadoCierre} onChange={e=>setFEstadoCierre(e.target.value)} style={SS}><option value="Todos">Todos los estados</option><option value="Pendiente">🟡 Pendiente</option><option value="Instalado">🟢 Instalado</option><option value="Baja">🔴 Baja</option></select>
      <select value={fAsesorCom} onChange={e=>setFAsesorCom(e.target.value)} style={SS}><option value="Todos">Todos los asesores</option><option value="">Sin asignar</option>{ASESORES_ATCLTE.map(a=><option key={a}>{a}</option>)}</select>
      <select value={fVendedor} onChange={e=>setFVendedor(e.target.value)} style={SS}><option value="Todos">Todos los vendedores</option>{VENDEDORES.map(v=><option key={v}>{v}</option>)}</select>
      <select value={fProvincia} onChange={e=>setFProvincia(e.target.value)} style={SS}><option value="Todas">Todas las provincias</option>{PROVINCIAS.map(p=><option key={p}>{p}</option>)}</select>
      <select value={fClasif} onChange={e=>setFClasif(e.target.value)} style={SS}><option value="Todas">Todas las clasificaciones</option>{CLASIFICACIONES.map(c=><option key={c}>{c}</option>)}</select>
      <select value={fModelo} onChange={e=>setFModelo(e.target.value)} style={SS}><option value="Todos">Todos los modelos</option>{MODELOS_ALL.map(m=><option key={m}>{m}</option>)}</select>
      {cadenas.length>0&&<select value={fCadena} onChange={e=>setFCadena(e.target.value)} style={SS}><option value="Todas">Todas las cadenas</option>{cadenas.map(c=><option key={c}>{c}</option>)}</select>}
    </div>
    <p style={{fontSize:11,color:"#6b7a99",margin:"0 0 8px"}}>{filteredCierres.length} de {cierres.length} cierres</p>
    {cierres.length===0&&<div style={{background:"#f4f7fb",borderRadius:12,padding:"2rem",textAlign:"center",border:"1px solid #dce6f5"}}><p style={{margin:0,fontSize:13,color:"#6b7a99"}}>No hay cierres.</p></div>}
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {filteredCierres.map(c=>{
        const open=expandedId===c.id,sinAsesor=!c.asesor;
        const est=c.estadoCierre||"Pendiente";
        const estColor=est==="Instalado"?"#2E75B6":est==="Baja"?"#791F1F":"#EF9F27";
        const estBg=est==="Instalado"?"#e8f1fb":est==="Baja"?"#FCEBEB":"#FAEEDA";
        const estIcon=est==="Instalado"?"🟢":est==="Baja"?"🔴":"🟡";
        return(<div key={c.id} style={{background:"#fff",border:"1px solid #dce6f5",borderRadius:12,overflow:"hidden",borderLeft:`3px solid ${estColor}`}}>
          <div onClick={()=>setExpandedId(open?null:c.id)} style={{padding:"12px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
            <div style={{minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <p style={{margin:0,fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.nombreFantasia}</p>
                {sinAsesor&&<span style={{background:"#FAEEDA",color:"#633806",fontSize:10,padding:"1px 7px",borderRadius:5,fontWeight:500,whiteSpace:"nowrap"}}>Sin asesor</span>}
                {c.cadena&&<span style={{background:"#e8f1fb",color:"#1F3864",fontSize:10,padding:"1px 7px",borderRadius:5,fontWeight:500,whiteSpace:"nowrap"}}>🔗 {c.cadena}</span>}
              </div>
              <p style={{margin:0,fontSize:11,color:"#6b7a99"}}>{c.razonSocial} · {c.vendedor||"Sin vendedor"} · {c.modelo||"Modelo a definir"}</p>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
              <button onClick={e=>{e.stopPropagation();setChatCierreId(c.id);}} style={{background:"#e8f1fb",color:"#1F3864",border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",fontWeight:500}}>💬</button>

              <span style={{background:estBg,color:estColor,fontSize:11,padding:"2px 8px",borderRadius:6,fontWeight:600}}>{estIcon} {est}</span>
              {esAdmin&&<button onClick={e=>{e.stopPropagation();abrirEdicion(c);}} style={{background:"#f0f4ff",color:"#1F3864",border:"1px solid #c5d3f0",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",fontWeight:500}}>✏️ Editar</button>}
              {esAdmin&&<button onClick={e=>{e.stopPropagation();eliminar(c.id,c.nombreFantasia);}} style={{background:"#FCEBEB",color:"#791F1F",border:"1px solid #f5c6c6",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",fontWeight:500}}>🗑</button>}
              <span style={{background:"#e8f1fb",color:"#1F3864",fontSize:11,padding:"2px 8px",borderRadius:6,fontWeight:500}}>{c.fecha}</span>
              <span style={{fontSize:11,color:"#6b7a99"}}>{open?"▲":"▼"}</span>
            </div>
          </div>
          {open&&(<div style={{padding:"0 14px 14px",borderTop:"1px solid #dce6f5"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:8,marginTop:10}}>

function GenericTable({data,headerBg="#1F3864"}){const[sortCol,setSortCol]=useState(null);const[sortDir,setSortDir]=useState("asc");if(!data||!data.headers||data.headers.length===0)return <div style={{padding:"1rem",textAlign:"center",color:"#6b7a99",fontSize:13}}>Sin datos</div>;const handleSort=col=>{if(sortCol===col)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortCol(col);setSortDir("asc");}};const parseFechaGT=(s)=>{if(!s)return null;const p=s.replace(/-/g,"/").split("/");if(p.length===3&&p[2].length===4){const[d,m,y]=p;const t=new Date(+y,+m-1,+d).getTime();if(!isNaN(t))return t;}return null;};const sorted=useMemo(()=>{if(!sortCol)return data.rows;return[...data.rows].sort((a,b)=>{const va=(a[sortCol]||""),vb=(b[sortCol]||"");const fa=parseFechaGT(va),fb=parseFechaGT(vb);if(fa!==null||fb!==null){const ra=fa??-Infinity,rb=fb??-Infinity;return sortDir==="asc"?ra-rb:rb-ra;}const na=parseFloat(va.replace(/[$.]/g,"").replace(",",".")),nb=parseFloat(vb.replace(/[$.]/g,"").replace(",","."));if(!isNaN(na)&&!isNaN(nb))return sortDir==="asc"?na-nb:nb-na;return sortDir==="asc"?va.toLowerCase().localeCompare(vb.toLowerCase(),"es"):vb.toLowerCase().localeCompare(va.toLowerCase(),"es");}); },[data.rows,sortCol,sortDir]);return(<div style={{overflowX:"auto",borderRadius:10,border:"1px solid #dce6f5"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr>{data.headers.map(h=>(<th key={h} onClick={()=>handleSort(h)} style={{background:headerBg,color:"white",padding:"9px 12px",textAlign:"left",fontWeight:500,fontSize:11,whiteSpace:"nowrap",cursor:"pointer",userSelect:"none"}}>{h} {sortCol===h?(sortDir==="asc"?"↑":"↓"):"↕"}</th>))}</tr></thead><tbody>{sorted.map((row,i)=>(<tr key={i} style={{background:i%2===0?"#fff":"#f4f7fb"}}>{data.headers.map(h=><td key={h} style={{padding:"8px 12px",borderBottom:"1px solid #dce6f5",whiteSpace:"nowrap",maxWidth:220,overflow:"hidden",textOverflow:"ellipsis"}}>{row[h]||"—"}</td>)}</tr>))}</tbody></table></div>);}

  if(!user){return(<div style={{background:"#f4f7fb",borderRadius:12,padding:"2rem",border:"1px solid #dce6f5",textAlign:"center"}}><p style={{fontSize:14,fontWeight:600,marginBottom:8}}>🔒 Acceso restringido</p><p style={{fontSize:13,color:"#6b7a99",marginBottom:16}}>El Generador de Contratos es de uso exclusivo de Administración.</p><button onClick={login} style={{background:"#1F3864",color:"white",border:"none",borderRadius:10,padding:"10px 24px",fontSize:13,fontWeight:600,cursor:"pointer"}}>Iniciar sesión con Google</button></div>);}
  if(!autorizado){return(<div style={{background:"#FCEBEB",borderRadius:12,padding:"2rem",border:"1px solid #f5c6c6",textAlign:"center"}}><p style={{fontSize:14,fontWeight:600,color:"#791F1F",marginBottom:8}}>⛔ Sin permiso</p><p style={{fontSize:13,color:"#791F1F"}}>Tu cuenta <strong>{user.email}</strong> no tiene acceso al Generador de Contratos.</p></div>);}
  const SS={fontSize:13,padding:"9px 12px",borderRadius:8,border:"1.5px solid #dce6f5",background:"#f4f7fb",color:"#1a2340",outline:"none",width:"100%"};
  const inp=(k,ph,type="text")=><input type={type} value={f[k]} onChange={e=>set(k,e.target.value)} placeholder={ph} style={SS}/>;
  const sel=(k,opts)=><select value={f[k]} onChange={e=>set(k,e.target.value)} style={{...SS,cursor:"pointer"}}><option value="">Seleccionar...</option>{opts.map(o=>typeof o==="string"?<option key={o}>{o}</option>:<option key={o.value} value={o.value}>{o.label}</option>)}</select>;
  const campo=(label,child,full=false)=><div style={{display:"flex",flexDirection:"column",gap:4,gridColumn:full?"1/-1":"auto"}}><label style={{fontSize:11,fontWeight:600,color:"#6b7a99",textTransform:"uppercase",letterSpacing:"0.5px"}}>{label}</label>{child}</div>;
  const sec=(num,titulo,children)=>(<div style={{border:"1px solid #dce6f5",borderRadius:12,overflow:"hidden",marginBottom:12}}><div style={{background:TIPO_COLORS[tipo]||"#1F3864",padding:"10px 16px",display:"flex",alignItems:"center",gap:10}}><span style={{width:20,height:20,borderRadius:"50%",background:"rgba(255,255,255,.2)",color:"white",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{num}</span><span style={{color:"white",fontSize:13,fontWeight:500}}>{titulo}</span></div><div style={{padding:"14px 16px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,background:"#fff"}}>{children}</div></div>);
  const generar=()=>{if(!parseInt(f.mensual)||!f.razonSocial||!f.firmante||!f.modelo){alert("Completá todos los campos obligatorios");return;}generarDOCX(f,tipo);setOk(true);};
  if(step==="tipo")return(<div><p style={{fontSize:13,color:"#6b7a99",marginBottom:16}}>Seleccioná el tipo de contrato a generar:</p><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>{TIPOS_CONTRATO.map(tp=>(<button key={tp} onClick={()=>{setTipo(tp);setStep("form");setOk(false);setF({dia:"",mes:"",nro:"",razonSocial:"",cuit:"",tipoSociedad:"",firmante:"",dni:"",direccion:"",modelo:"",botellas:"",valorUsd:"",mensual:"",ajuste:"",instalacion:"0"});}} style={{background:TIPO_COLORS[tp]||"#1F3864",color:"white",border:"none",borderRadius:12,padding:"18px 14px",fontSize:13,fontWeight:600,cursor:"pointer",textAlign:"left",lineHeight:1.4}}>{tp==="Buenos Aires"?"🏙️":tp.startsWith("Interior")?"🗺️":tp.startsWith("Hielogic")?"🧊":"🏢"} {tp}</button>))}</div></div>);
  return(<div>
    <button onClick={()=>setStep("tipo")} style={{background:"none",border:"1px solid #dce6f5",borderRadius:8,padding:"6px 14px",fontSize:12,cursor:"pointer",color:"#6b7a99",marginBottom:14}}>← Cambiar tipo</button>
    <div style={{background:TIPO_COLORS[tipo]||"#1F3864",borderRadius:10,padding:"10px 16px",marginBottom:14}}><p style={{margin:0,color:"white",fontSize:14,fontWeight:600}}>{tipo}</p><p style={{margin:0,color:"rgba(255,255,255,.7)",fontSize:11}}>{tipo==="AQA Office"?"Aquaimport S.R.L. · Luciano Szuldman":isH?"Fadefil S.A. · Equipo fabricador de hielo":"Fadefil S.A. · Dispensador AQA"}</p></div>
    {sec(1,"Datos del Contrato",<div style={{gridColumn:"1/-1",display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>{campo("Día",inp("dia","20","number"))}{campo("Mes",sel("mes",MESES))}{campo("N° Oferta",inp("nro","142"))}</div>)}
    {sec(2,"Datos del Cliente",<>{campo("Razón Social",inp("razonSocial","El Bar de Juan S.R.L."),true)}{campo("CUIT",inp("cuit","30-12345678-9"))}{campo("Tipo de Sociedad",sel("tipoSociedad",SOCIEDADES))}{campo("Nombre del Firmante",inp("firmante","Juan Pérez"))}{campo("DNI del Firmante",inp("dni","28.456.789"))}{campo("Dirección",inp("direccion","Av. Corrientes 1234"),true)}</>)}
    {sec(3,isH?"Equipo Hielogic":"Equipo AQA",<>{campo("Modelo",sel("modelo",modelosDisp))}{!isH&&campo("Cant. Botellas",inp("botellas","6","number"))}{campo("Valor USD Reposición",sel("valorUsd",usdDisp),isH)}</>)}
    {sec(4,"Precio",<>{campo("Valor Mensual ($ sin IVA)",inp("mensual","350000","number"))}{campo("Tipo de Ajuste",sel("ajuste",AJUSTES))}{campo("Costo Instalación ($ sin IVA)",inp("instalacion","0","number"))}</>)}
    <button onClick={generar} style={{width:"100%",background:TIPO_COLORS[tipo]||"#1F3864",color:"white",border:"none",borderRadius:10,padding:"13px",fontSize:14,fontWeight:600,cursor:"pointer",marginTop:4}}>⬇ Descargar Contrato (.docx)</button>
    {ok&&<div style={{marginTop:10,padding:"10px 14px",background:"#e6f7f1",color:"#1a5c3a",borderRadius:8,fontSize:13,fontWeight:500}}>✔ Descargado. Abrilo con Word y guardá como PDF.</div>}
  </div>);
}

function PedidoFormModal({initial,editandoId,zona,onGuardar,onCancelar}){
  const[form,setForm]=useState({...PEDIDO_VACIO,...(initial||{}),zona});
  const setF=(k,v)=>setForm(p=>({...p,[k]:v}));
  const SS={fontSize:13,padding:"9px 12px",borderRadius:8,border:"1.5px solid #dce6f5",background:"#f4f7fb",color:"#1a2340",outline:"none",width:"100%"};
  const inp=(k,ph,type="text")=><input type={type} value={form[k]||""} onChange={e=>setF(k,e.target.value)} placeholder={ph} style={SS}/>;
  const campo=(label,child,full=false)=><div style={{display:"flex",flexDirection:"column",gap:4,gridColumn:full?"1/-1":"auto"}}><label style={{fontSize:11,fontWeight:600,color:"#6b7a99",textTransform:"uppercase",letterSpacing:"0.4px"}}>{label}</label>{child}</div>;
  const esInt=zona==="Interior";
  const guardar=async()=>{if(!form.nombreFantasia){alert("Ingresá el Nombre de Fantasía");return;}await onGuardar(form,editandoId);};
  return(
    <div className="overlay" onClick={e=>{if(e.target.className==="overlay")onCancelar();}}>
      <div className="modal" style={{maxWidth:580}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div><p style={{margin:0,fontSize:15,fontWeight:600}}>{editandoId?"✏️ Editar Pedido":"📦 Nuevo Pedido"}</p><p style={{margin:0,fontSize:11,color:"#6b7a99"}}>Logística {zona}</p></div>
          <button onClick={onCancelar} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#6b7a99"}}>✕</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          {campo("Nombre de Fantasía",inp("nombreFantasia","Ej: LOI SUITES"),true)}
          {campo("Tipo de Trabajo",<select value={form.tipoTrabajo||""} onChange={e=>setF("tipoTrabajo",e.target.value)} style={{...SS,cursor:"pointer"}}><option value="">Seleccionar...</option>{LOG_TIPOS_TRABAJO.map(t=><option key={t}>{t}</option>)}</select>)}
          {campo("Tipo de Cliente (múltiple)",
            <div style={{display:"flex",flexWrap:"wrap",gap:6,paddingTop:2}}>
              {LOG_TIPOS_CLIENTE.map(t=>{
                const sel=Array.isArray(form.tipoCliente)?form.tipoCliente.includes(t):(form.tipoCliente===t);
                const toggle=()=>{
                  const cur=Array.isArray(form.tipoCliente)?form.tipoCliente:(form.tipoCliente?[form.tipoCliente]:[]);
                  setF("tipoCliente",sel?cur.filter(x=>x!==t):[...cur,t]);
                };
                return(
                  <button key={t} onClick={toggle} style={{background:sel?"#1F3864":"#f4f7fb",color:sel?"white":"#1a2340",border:`1.5px solid ${sel?"#1F3864":"#dce6f5"}`,borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer",fontWeight:sel?600:400}}>
                    {t}
                  </button>
                );
              })}
            </div>,
            true
          )}
          {campo("Asesor/a",<select value={form.asesor||""} onChange={e=>setF("asesor",e.target.value)} style={{...SS,cursor:"pointer"}}><option value="">Seleccionar...</option>{LOG_ASESORES.map(a=><option key={a}>{a}</option>)}</select>)}
          {campo("Status",<select value={form.status||"Solicitado"} onChange={e=>setF("status",e.target.value)} style={{...SS,cursor:"pointer"}}>{ALL_STATUSES.map(s=><option key={s}>{s}</option>)}</select>)}
          {esInt&&campo("Plaza",<select value={form.plaza||""} onChange={e=>setF("plaza",e.target.value)} style={{...SS,cursor:"pointer"}}><option value="">Seleccionar...</option>{LOG_PLAZAS.map(p=><option key={p}>{p}</option>)}</select>)}
          {campo("Fecha Asignada (Logística)",inp("fechaAsignada","","date"))}
          {campo("Fecha y Hora Disponible (AC)",inp("fechaYHora","Ej: Lun-Mar 9 a 12hs"))}
          {campo("Coordinado con (nombre)",inp("coordinadoNombre","Ej: Karen"))}
          {campo("Teléfono coordinación",inp("coordinadoTel","Ej: +54 9 11 1234-5678"))}
          {campo("Dirección",inp("direccion","Ej: Av. Corrientes 1234"),true)}
          {campo("Detalles / Observaciones",<textarea value={form.detalles||""} onChange={e=>setF("detalles",e.target.value)} rows={3} placeholder="Describí el pedido..." style={{...SS,resize:"vertical"}}/>,true)}
          {campo("Documentación requerida",inp("documentacion","Ej: Habilitación municipal"),true)}
        </div>
        <button onClick={guardar} style={{width:"100%",background:"#8a3a00",color:"white",border:"none",borderRadius:10,padding:"13px",fontSize:14,fontWeight:600,cursor:"pointer"}}>
          {editandoId?"✔ Guardar cambios":"✔ Crear Pedido"}
        </button>
      </div>
    </div>
  );
}

function KanbanCard({pedido,onEdit,onDelete}){
  const cols=[...COLS_CABA,...COLS_INT.slice(COLS_CABA.length)];
  const colMeta=cols.find(c=>c.id===pedido.status)||{color:"#6b7a99"};
  const ttColors={"Instalación":"#1a5c3a","Desinstalación":"#8a2a2a","Reparación":"#8a5a00","Entrega":"#1a3a8a","Relevamiento":"#5a1a8a","Mantenimiento":"#0a5a5a","Recambio de CO2":"#4a7a00","Cambio de Modelo":"#7a4a00","Cambio de Ubicación":"#4a4a8a","Proveedores":"#6b7a99"};
  const ttC=ttColors[pedido.tipoTrabajo]||"#6b7a99";
  // Status badge color
  const statusCol=colMeta.color;
  const statusBg=colMeta.bg||"#edf0f7";
  // tipoCliente puede ser array o string
  const tiposCliente=Array.isArray(pedido.tipoCliente)?pedido.tipoCliente:(pedido.tipoCliente?[pedido.tipoCliente]:[]);
  return(
    <div className="kanban-card" draggable onDragStart={e=>e.dataTransfer.setData("pedidoId",pedido.id)} style={{borderLeftColor:colMeta.color}}>
      {/* 1. Nombre */}
      <div className="kanban-card-name">{pedido.nombreFantasia||"Sin nombre"}</div>
      {/* 2. Tipo de Trabajo */}
      {pedido.tipoTrabajo&&<span className="kanban-badge" style={{background:ttC+"22",color:ttC}}>{pedido.tipoTrabajo}</span>}
      <div className="kanban-card-meta" style={{marginTop:5}}>
        {/* 3. Fecha Asignada */}
        {pedido.fechaAsignada&&<div>📅 <strong>{pedido.fechaAsignada}</strong></div>}
        {/* 4. Status */}
        <div style={{marginTop:2}}>
          <span style={{background:statusBg,color:statusCol,fontSize:10,padding:"1px 6px",borderRadius:5,fontWeight:600}}>{pedido.status||"Solicitado"}</span>
        </div>
        {/* 5. Detalles */}
        {pedido.detalles&&<div style={{marginTop:3,color:"#8a9ab5",fontSize:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pedido.detalles}</div>}
        {/* 6. Asesor */}
        {pedido.asesor&&<div style={{marginTop:2}}>👤 {pedido.asesor}</div>}
        {/* Tipo cliente (chips) */}
        {tiposCliente.length>0&&<div style={{display:"flex",gap:3,flexWrap:"wrap",marginTop:3}}>{tiposCliente.map(t=><span key={t} style={{background:"#e8f1fb",color:"#1F3864",fontSize:9,padding:"1px 5px",borderRadius:4,fontWeight:600}}>{t}</span>)}</div>}
        {pedido.plaza&&<div style={{marginTop:2}}>📍 {pedido.plaza}</div>}
      </div>
      <div style={{display:"flex",gap:4,marginTop:8}}>
        <button onClick={()=>onEdit(pedido)} style={{flex:1,background:"#f0f4ff",color:"#1F3864",border:"none",borderRadius:6,padding:"4px",fontSize:11,cursor:"pointer"}}>✏️ Editar</button>
        <button onClick={()=>onDelete(pedido)} style={{background:"#fef0f0",color:"#c0392b",border:"none",borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer"}}>🗑</button>
      </div>
    </div>
  );
}

function KanbanColumn({col,pedidos,onAddCard,onEdit,onDelete,onDrop}){
  const[dragOver,setDragOver]=useState(false);
  return(
    <div className={`kanban-col${dragOver?" drag-over":""}`} style={{background:dragOver?col.bg+"cc":col.bg}}
      onDragOver={e=>{e.preventDefault();setDragOver(true);}}
      onDragLeave={()=>setDragOver(false)}
      onDrop={e=>{e.preventDefault();setDragOver(false);const id=e.dataTransfer.getData("pedidoId");if(id)onDrop(id,col.id);}}>
      <div className="kanban-col-header">
        <span className="kanban-col-title" style={{color:col.color}}>{col.label}</span>
        <span className="kanban-col-count" style={{color:col.color}}>{pedidos.length}</span>
      </div>
      {pedidos.map(p=><KanbanCard key={p.id} pedido={p} onEdit={onEdit} onDelete={onDelete}/>)}
      <button className="add-btn" onClick={()=>onAddCard(col.id)}>+ Añadir registro</button>
    </div>
  );
}

function LogisticaPedidos({zona}){
  const fb=useFirebase();
  const coleccion=zona==="CABA"?"pedidos_caba":"pedidos_interior";
  const cols=zona==="CABA"?COLS_CABA:COLS_INT;
  const[pedidos,setPedidos]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showForm,setShowForm]=useState(false);
  const[editandoId,setEditandoId]=useState(null);
  const[initialForm,setInitialForm]=useState({...PEDIDO_VACIO,status:"Solicitado"});
  const[fAsesor,setFAsesor]=useState("Todos");
  const[fTipo,setFTipo]=useState("Todos");
  const[fPlaza,setFPlaza]=useState("Todas");
  const[q,setQ]=useState("");
  const SS={fontSize:12,padding:"7px 10px",borderRadius:8,border:"1px solid #dce6f5",background:"#fff",color:"#1a2340",outline:"none"};

  useEffect(()=>{if(!fb)return;const{db,collection,query,orderBy,onSnapshot}=fb;const qr=query(collection(db,coleccion),orderBy("ts","desc"));const unsub=onSnapshot(qr,snap=>{setPedidos(snap.docs.map(d=>({id:d.id,...d.data()})));setLoading(false);});return()=>unsub();},[fb,coleccion]);
  useEffect(()=>{if(fb&&loading)setLoading(false);},[fb]);

  const filtrados=useMemo(()=>pedidos.filter(p=>{const sq=q.toLowerCase();return((p.nombreFantasia||"").toLowerCase().includes(sq)||(p.detalles||"").toLowerCase().includes(sq))&&(fAsesor==="Todos"||(p.asesor||"")===fAsesor)&&(fTipo==="Todos"||(p.tipoTrabajo||"")===fTipo)&&(fPlaza==="Todas"||(p.plaza||"")===fPlaza);}),[pedidos,q,fAsesor,fTipo,fPlaza]);

  const porCol=useMemo(()=>{const m={};cols.forEach(c=>{m[c.id]=[];});filtrados.forEach(p=>{const col=p.status||"Sin categorizar";if(m[col])m[col].push(p);else if(m["Sin categorizar"])m["Sin categorizar"].push(p);});return m;},[filtrados,cols]);

  const abrirNuevo=(statusDefault="Solicitado")=>{setEditandoId(null);setInitialForm({...PEDIDO_VACIO,status:statusDefault,zona});setShowForm(true);};
  const abrirEdicion=(p)=>{setEditandoId(p.id);setInitialForm({...PEDIDO_VACIO,...p});setShowForm(true);};
  const guardar=async(form,eid)=>{if(!fb)return;const{db,collection,addDoc,doc,setDoc}=fb;const data={...form,zona,ts:eid?form.ts:Date.now(),updatedAt:Date.now()};if(eid)await setDoc(doc(db,coleccion,eid),data,{merge:true});else await addDoc(collection(db,coleccion),{...data,createdAt:Date.now()});setShowForm(false);setEditandoId(null);};
  const eliminar=async(p)=>{if(!confirm(`¿Eliminar "${p.nombreFantasia}"?`))return;if(!fb)return;const{db,doc,deleteDoc}=fb;await deleteDoc(doc(db,coleccion,p.id));};
  const onDrop=async(pedidoId,newStatus)=>{if(!fb)return;const{db,doc,setDoc}=fb;await setDoc(doc(db,coleccion,pedidoId),{status:newStatus,updatedAt:Date.now()},{merge:true});};

  if(!fb||loading)return <div style={{padding:"2rem",textAlign:"center",fontSize:13,color:"#6b7a99"}}>Conectando...</div>;

  return(
    <div>
      {showForm&&<PedidoFormModal initial={initialForm} editandoId={editandoId} zona={zona} onGuardar={guardar} onCancelar={()=>{setShowForm(false);setEditandoId(null);}}/>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div><p style={{margin:0,fontSize:13,fontWeight:600}}>Logística {zona}</p><p style={{margin:0,fontSize:11,color:"#6b7a99"}}>{pedidos.length} pedidos · tiempo real 🟢</p></div>
        <button onClick={()=>abrirNuevo()} style={{background:"#8a3a00",color:"white",border:"none",borderRadius:10,padding:"9px 16px",fontSize:13,fontWeight:600,cursor:"pointer"}}>+ Nuevo pedido</button>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        <input placeholder="Buscar cliente..." value={q} onChange={e=>setQ(e.target.value)} style={{...SS,flex:1,minWidth:120}}/>
        <select value={fAsesor} onChange={e=>setFAsesor(e.target.value)} style={SS}><option value="Todos">Todos los asesores</option>{LOG_ASESORES.map(a=><option key={a}>{a}</option>)}</select>
        <select value={fTipo} onChange={e=>setFTipo(e.target.value)} style={SS}><option value="Todos">Todos los tipos</option>{LOG_TIPOS_TRABAJO.map(t=><option key={t}>{t}</option>)}</select>
        {zona==="Interior"&&<select value={fPlaza} onChange={e=>setFPlaza(e.target.value)} style={SS}><option value="Todas">Todas las plazas</option>{LOG_PLAZAS.map(p=><option key={p}>{p}</option>)}</select>}
      </div>
      <div className="kanban-wrap">
        <div className="kanban-board">
          {cols.map(col=><KanbanColumn key={col.id} col={col} pedidos={porCol[col.id]||[]} onAddCard={s=>abrirNuevo(s)} onEdit={abrirEdicion} onDelete={eliminar} onDrop={onDrop}/>)}
        </div>
      </div>
    </div>
  );
}

function SinAsignarModal({clientes,asesores,onClose,fmt}){
  const fb=useFirebase();
  const[asignaciones,setAsignaciones]=useState({});// id -> asesor seleccionado
  const[guardando,setGuardando]=useState({});
  const[guardados,setGuardados]=useState({});

  // Cargar asignaciones previas desde Firebase
  useEffect(()=>{
    if(!fb)return;
    const{db,collection,getDocs}=fb;
    getDocs(collection(db,"asesorAtClteOverride")).then(snap=>{
      const m={};
      snap.docs.forEach(d=>{m[d.id]=d.data().asesor||"";});
      setAsignaciones(m);
      setGuardados(Object.fromEntries(Object.keys(m).map(k=>[k,true])));
    }).catch(()=>{});
  },[fb]);

  const guardar=async(cliente)=>{
    const asesor=asignaciones[cliente.id];
    if(!asesor||!fb)return;
    setGuardando(p=>({...p,[cliente.id]:true}));
    const{db,doc,setDoc}=fb;
    await setDoc(doc(db,"asesorAtClteOverride",cliente.id),{
      asesor,nombre:cliente.nombre,id:cliente.id,cartera:cliente.cartera||"",updatedAt:Date.now()
    });
    setGuardando(p=>({...p,[cliente.id]:false}));
    setGuardados(p=>({...p,[cliente.id]:true}));
  };

  const SS={fontSize:12,padding:"5px 8px",borderRadius:7,border:"1.5px solid #dce6f5",background:"#f4f7fb",color:"#1a2340",outline:"none",cursor:"pointer"};

  // Separar los que ya tienen asignación guardada vs los pendientes
  const pendientes=clientes.filter(c=>!guardados[c.id]);
  const resueltos=clientes.filter(c=>guardados[c.id]);

  return(
    <div className="overlay" onClick={e=>{if(e.target.className==="overlay")onClose();}}>
      <div className="modal" style={{maxWidth:680}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div>
            <p style={{margin:0,fontSize:15,fontWeight:700}}>Sin asesor de AC asignado</p>
            <p style={{margin:0,fontSize:11,color:"#6b7a99"}}>
              {pendientes.length} pendientes · {resueltos.length} resueltos
            </p>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#6b7a99"}}>✕</button>
        </div>

        <div style={{maxHeight:500,overflowY:"auto"}}>
          {/* Pendientes */}
          {pendientes.length>0&&(
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:"#8a3a00",textTransform:"uppercase",letterSpacing:".4px",marginBottom:8,padding:"4px 0",borderBottom:"1px solid #ffe0cc"}}>
                ⚠️ Pendientes ({pendientes.length})
              </div>
              {pendientes.map((c,i)=>(
                <div key={c.id+i} style={{display:"grid",gridTemplateColumns:"90px 1fr 150px 40px",gap:6,alignItems:"center",padding:"8px 4px",borderBottom:"1px solid #f0f3f8",background:i%2===0?"#fff":"#fafbff"}}>
                  <div style={{fontSize:10,color:"#9baabf",fontFamily:"monospace"}}>{c.id}</div>
                  <div>
                    <div style={{fontSize:12,fontWeight:600}}>{c.nombre}</div>
                    <div style={{fontSize:10,color:"#9baabf"}}>{c.cartera} · Cob: {c.asesorCob||"—"} · {fmt(c.deuda||0)}</div>
                  </div>
                  <select
                    value={asignaciones[c.id]||""}
                    onChange={e=>setAsignaciones(p=>({...p,[c.id]:e.target.value}))}
                    style={SS}
                  >
                    <option value="">Seleccionar asesor...</option>
                    {asesores.map(a=><option key={a}>{a}</option>)}
                  </select>
                  <button
                    onClick={()=>guardar(c)}
                    disabled={!asignaciones[c.id]||guardando[c.id]}
                    style={{background:asignaciones[c.id]?"#1F3864":"#dce6f5",color:asignaciones[c.id]?"white":"#9baabf",border:"none",borderRadius:7,padding:"6px",fontSize:11,cursor:asignaciones[c.id]?"pointer":"default",fontWeight:600}}
                  >
                    {guardando[c.id]?"...":"✔"}
                  </button>
                </div>
              ))}
            </div>
          )}

          {/* Ya resueltos */}
          {resueltos.length>0&&(
            <div>
              <div style={{fontSize:11,fontWeight:700,color:"#27ae60",textTransform:"uppercase",letterSpacing:".4px",marginBottom:8,padding:"4px 0",borderBottom:"1px solid #d5f5e3"}}>
                ✅ Asignados ({resueltos.length})
              </div>
              {resueltos.map((c,i)=>(
                <div key={c.id+i} style={{display:"grid",gridTemplateColumns:"90px 1fr 150px 40px",gap:6,alignItems:"center",padding:"6px 4px",borderBottom:"1px solid #f0f3f8",opacity:.7}}>
                  <div style={{fontSize:10,color:"#9baabf",fontFamily:"monospace"}}>{c.id}</div>
                  <div>
                    <div style={{fontSize:12,fontWeight:600}}>{c.nombre}</div>
                    <div style={{fontSize:10,color:"#9baabf"}}>{c.cartera}</div>
                  </div>
                  <div style={{fontSize:12,color:"#27ae60",fontWeight:600}}>{asignaciones[c.id]}</div>
                  <button
                    onClick={()=>{setGuardados(p=>({...p,[c.id]:false}));}}
                    style={{background:"none",border:"1px solid #dce6f5",borderRadius:7,padding:"5px",fontSize:10,cursor:"pointer",color:"#9baabf"}}
                    title="Editar"
                  >✏️</button>
                </div>
              ))}
            </div>
          )}

          {clientes.length===0&&(
            <div style={{textAlign:"center",padding:"2rem",color:"#27ae60",fontSize:14,fontWeight:600}}>
              ✅ Todos los clientes tienen asesor de AC asignado
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

const OBJETIVOS_2026={
  Bajas: [18,12,27,13,13,8,24,13,15,25,14,12],
  Altas: [40,34,34,40,54,59,59,59,72,79,72,59],
  Netos: [22,22,7,27,41,51,35,46,57,54,58,47]
};
function StatCard({label,value,sub,color="#1F3864",icon}){

    <div style={{background:"#fff",borderRadius:14,padding:"16px 18px",border:"1px solid #e8eef8",boxShadow:"0 2px 8px rgba(0,0,0,.05)",flex:1,minWidth:140}}>
      <div style={{fontSize:22,marginBottom:4}}>{icon}</div>

function ProgressBar({value,max,color="#27ae60",label,sublabel}){
  const pct=max>0?Math.min(100,Math.round(value/max*100)):0;

  return(

function MiniBar({label,value,max,color}){
  const pct=max>0?Math.min(100,Math.round(value/max*100)):0;

      </div>
      <div style={{width:40,fontSize:11,fontWeight:700,color:"#1a2340",textAlign:"right"}}>{value}</div>
    </div>
  );
}

function DonutChart({data,size=120}){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(total===0)return null;
  let cumulative=0;
  const cx=size/2,cy=size/2,r=size*0.38,inner=size*0.22;
  const slices=data.map(d=>{
    const startAngle=cumulative/total*2*Math.PI-Math.PI/2;
    cumulative+=d.value;
    const endAngle=cumulative/total*2*Math.PI-Math.PI/2;
    const x1=cx+r*Math.cos(startAngle),y1=cy+r*Math.sin(startAngle);
    const x2=cx+r*Math.cos(endAngle),y2=cy+r*Math.sin(endAngle);
    const xi1=cx+inner*Math.cos(startAngle),yi1=cy+inner*Math.sin(startAngle);
    const xi2=cx+inner*Math.cos(endAngle),yi2=cy+inner*Math.sin(endAngle);
    const large=d.value/total>0.5?1:0;
    return{...d,path:`M${xi1},${yi1} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${xi2},${yi2} A${inner},${inner} 0 ${large},0 ${xi1},${yi1} Z`};
  });
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {slices.map((s,i)=><path key={i} d={s.path} fill={s.color} stroke="#fff" strokeWidth={1.5}/>)}
      <text x={cx} y={cy+4} textAnchor="middle" fontSize={size*0.13} fontWeight="700" fill="#1a2340">{total.toLocaleString("es-AR")}</text>
    </svg>
  );
}

function Resumen({clientes,cierres,desins,asesorOverride={}}){
  const mesActual=new Date().getMonth(); // 0-indexed
  const anoActual=new Date().getFullYear();

  // ── Objetivos del mes ─────────────────────────────────────────
  const objAltas=OBJETIVOS_2026.Altas[mesActual]||0;
  const objBajas=OBJETIVOS_2026.Bajas[mesActual]||0;
  const objNetos=OBJETIVOS_2026.Netos[mesActual]||0;

  const parseFechaMes=(s,mes,ano)=>{
    if(!s)return false;
    const p=s.replace(/-/g,"/").split("/");
    if(p.length<3)return false;
    return parseInt(p[1])===mes+1&&parseInt(p[2])===ano;
  };
  // Altas del mes: Inicio de Servicio en el mes corriente (hoja Instalaciones Pendientes = clientes recientes)
  // Usamos fechaInstalacion que viene del comodato (columna "Inicio de Servicio")
  const instMes=useMemo(()=>clientes.filter(c=>parseFechaMes(c.fechaInstalacion,mesActual,anoActual)).length,[clientes,mesActual,anoActual]);
  // Bajas del mes: desde desinstalaciones con fecha del mes corriente
  const bajasMes=useMemo(()=>(desins||[]).filter(d=>parseFechaMes(d.fechaDesins,mesActual,anoActual)).length,[desins,mesActual,anoActual]);

  // Cartera general
  const habilitados=useMemo(()=>clientes.filter(c=>c.estado==="habilitado").length,[clientes]);
  const pendientes=useMemo(()=>clientes.filter(c=>c.estado==="pendiente").length,[clientes]);
  const inhabilitados=useMemo(()=>clientes.filter(c=>c.estado==="inhabilitado").length,[clientes]);
  const totalClientes=clientes.length;

  // Deuda total
  const deudaTotal=useMemo(()=>clientes.reduce((s,c)=>s+(c.deuda||0),0),[clientes]);

  // Cartera por asesor AC (top 8)
  const carteraAC=useMemo(()=>{
    const m={};
    clientes.forEach(c=>{
      const a=asesorOverride[c.id]||c.asesorAtClte||"Sin asignar";
      if(!m[a])m[a]={count:0,deuda:0};
      m[a].count++;m[a].deuda+=(c.deuda||0);
    });
    return Object.entries(m).map(([a,d])=>({asesor:a,...d})).sort((a,b)=>b.count-a.count).slice(0,10);
  },[clientes]);
  const maxAC=carteraAC[0]?.count||1;

  // Cobranzas por asesor (con deuda > 0)
  const carteraCob=useMemo(()=>{
    const m={};
    clientes.filter(c=>(c.deuda||0)>0).forEach(c=>{
      const a=c.asesorCob||"Sin asignar";
      if(!m[a])m[a]={count:0,deuda:0};
      m[a].count++;m[a].deuda+=(c.deuda||0);
    });
    return Object.entries(m).map(([a,d])=>({asesor:a,...d})).sort((a,b)=>b.deuda-a.deuda).slice(0,8);
  },[clientes]);
  const maxDeuda=carteraCob[0]?.deuda||1;

  // Ranking comercial (vendedor)
  const rankingComercial=useMemo(()=>{
    const m={};
    clientes.forEach(c=>{
      const v=c.vendedor||"Sin asignar";
      if(!m[v])m[v]=0;
      m[v]++;
    });
    return Object.entries(m).map(([v,n])=>({vendedor:v,count:n})).sort((a,b)=>b.count-a.count).filter(x=>x.vendedor!=="Sin asignar"&&x.vendedor!=="Cadena").slice(0,10);
  },[clientes]);
  const maxVend=rankingComercial[0]?.count||1;

  // Ranking desde cierres Comercial
  const rankingCierres=useMemo(()=>{
    if(!cierres||cierres.length===0)return[];
    const m={};
    cierres.forEach(c=>{const v=c.vendedor||c.asesor||"";if(v)m[v]=(m[v]||0)+1;});
    return Object.entries(m).map(([v,n])=>({vendedor:v,count:n})).sort((a,b)=>b.count-a.count).slice(0,8);
  },[cierres]);
  const maxCierre=rankingCierres[0]?.count||1;

  // Modelos activos
  const normModelo=(s)=>{
    if(!s)return null;
    // Quitar prefijo "B - " o "B-", colapsar espacios
    let m=s.replace(/^B\s*-\s*/,"").replace(/\s+/g,"").toUpperCase().trim();
    // Alias conocidos
    const alias={"SM80":"SM80","BM80":"BM80","RBF":"RBF","WL7":"WL7","WL7S/BASE":"WL7","OFF20":"OFF20","OFF20C/PIE":"OFF20","OFF20SM":"OFF20","OFF20C":"OFF20","120P":"120P","210P":"210P","420P":"420P","700P":"700P","31A":"31A","RBFL":"RBF","RBFS":"RBF","SM30RF":"RBF","SM30R":"RBF"};
    return alias[m]||m||null;
  };
  const modelos=useMemo(()=>{
    const m={};
    clientes.filter(c=>c.estado==="habilitado").forEach(c=>{
      const mod=normModelo(c.modelo);
      if(!mod)return;
      m[mod]=(m[mod]||0)+1;
    });
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,12);
  },[clientes]);
  const maxMod=modelos[0]?.[1]||1;

  const fmt=n=>n>=1000000?`$${(n/1000000).toFixed(1)}M`:n>=1000?`$${Math.round(n/1000)}K`:`$${n}`;
  const secTitle=(t,icon)=>(
    <div style={{display:"flex",alignItems:"center",gap:8,margin:"24px 0 12px"}}>
      <span style={{fontSize:18}}>{icon}</span>
      <span style={{fontSize:15,fontWeight:700,color:"#1a2340"}}>{t}</span>
    </div>
  );

  const DONUT_DATA=[
    {label:"Habilitados",value:habilitados,color:"#27ae60"},
    {label:"Fc. Pendientes",value:pendientes,color:"#f0a500"},
    {label:"Inhabilitados",value:inhabilitados,color:"#e74c3c"},
  ];

  const[sinAsignarModal,setSinAsignarModal]=useState(false);
  const sinAsignarClientes=useMemo(()=>clientes.filter(c=>(!c.asesorAtClte||c.asesorAtClte.trim()==="")&&!asesorOverride[c.id]),[clientes,asesorOverride]);

  return(
    <div style={{padding:"4px 0"}}>
      {sinAsignarModal&&(
        <SinAsignarModal
          clientes={sinAsignarClientes}
          asesores={ASESORES_ATCLTE}
          onClose={()=>setSinAsignarModal(false)}
          fmt={fmt}
        />
      )}

      {/* ── ESTADO GENERAL ─────────────────────── */}
      {secTitle("Estado general de la flota","🏢")}
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:16}}>
        <StatCard label="Clientes totales" value={totalClientes.toLocaleString("es-AR")} icon="📋" color="#1F3864"/>
        <StatCard label="Habilitados" value={habilitados.toLocaleString("es-AR")} icon="✅" color="#27ae60"/>
        <StatCard label="Fc. Pendientes" value={pendientes.toLocaleString("es-AR")} icon="⏳" color="#d35400"/>
        <StatCard label="Inhabilitados" value={inhabilitados.toLocaleString("es-AR")} icon="🚫" color="#e74c3c"/>
        <StatCard label="Deuda total" value={fmt(deudaTotal)} icon="💰" color="#8a3a00"/>
      </div>

      {/* Donut */}
      <div style={{background:"#fff",borderRadius:14,padding:"16px 20px",border:"1px solid #e8eef8",boxShadow:"0 2px 8px rgba(0,0,0,.05)",display:"flex",alignItems:"center",gap:24,flexWrap:"wrap",marginBottom:4}}>
        <DonutChart data={DONUT_DATA} size={130}/>
        <div style={{flex:1,minWidth:160}}>
          {DONUT_DATA.map(d=>(
            <div key={d.label} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <div style={{width:12,height:12,borderRadius:3,background:d.color,flexShrink:0}}/>
              <span style={{fontSize:13,color:"#1a2340",flex:1}}>{d.label}</span>
              <span style={{fontSize:13,fontWeight:700,color:d.color}}>{d.value.toLocaleString("es-AR")}</span>
              <span style={{fontSize:11,color:"#9baabf"}}>({totalClientes>0?Math.round(d.value/totalClientes*100):0}%)</span>
            </div>
          ))}
        </div>
      </div>

      {/* ── OBJETIVOS DEL MES ──────────────────── */}
      {secTitle(`Objetivos ${MESES[mesActual]} ${anoActual}`,"🎯")}
      <div style={{background:"#fff",borderRadius:14,padding:"18px 20px",border:"1px solid #e8eef8",boxShadow:"0 2px 8px rgba(0,0,0,.05)"}}>
        {(()=>{
          // Calcular días hábiles transcurridos y totales del mes
          const hoy=new Date();
          const diasEnMes=new Date(anoActual,mesActual+1,0).getDate();
          let diasHabilesTotales=0,diasHabilesTranscurridos=0;
          for(let d=1;d<=diasEnMes;d++){const dow=new Date(anoActual,mesActual,d).getDay();if(dow!==0&&dow!==6){diasHabilesTotales++;if(d<=hoy.getDate())diasHabilesTranscurridos++;}}
          const pctMes=diasHabilesTotales>0?diasHabilesTranscurridos/diasHabilesTotales:0;
          const ritmoAltas=Math.round(objAltas*pctMes);
          const ritmoNetos=Math.round(objNetos*pctMes);
          const diffAltas=instMes-ritmoAltas;
          const diffNetos=(instMes-bajasMes)-ritmoNetos;
          const semaforoAltas=diffAltas>=0?"🟢":diffAltas>=-5?"🟡":"🔴";
          const semaforoNetos=diffNetos>=0?"🟢":diffNetos>=-3?"🟡":"🔴";
          const pctDias=Math.round(pctMes*100);
          return(<>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,padding:"8px 12px",background:"#f4f7fb",borderRadius:9}}>
              <span style={{fontSize:11,color:"#6b7a99",fontWeight:600}}>{"Día "+hoy.getDate()+" de "+diasEnMes+" — "+pctDias+"% del mes transcurrido ("+diasHabilesTranscurridos+"/"+diasHabilesTotales+" días hábiles)"}</span>
            </div>
            <ProgressBar value={instMes} max={objAltas} color="#1F3864" label={"Altas — "+instMes+" de "+objAltas}
              sublabel={instMes>=objAltas?"✅ Objetivo cumplido!":semaforoAltas+" Ritmo esperado: "+ritmoAltas+" · "+( diffAltas>=0?"adelantado "+diffAltas:"atrasado "+(Math.abs(diffAltas)))}/>
            <ProgressBar value={bajasMes} max={objBajas} color="#e74c3c" label={"Bajas — "+bajasMes+" de "+objBajas}
              sublabel={bajasMes<=objBajas?"✅ Dentro del objetivo":(bajasMes-objBajas)+" bajas sobre el objetivo"}/>
            <ProgressBar value={Math.max(0,instMes-bajasMes)} max={objNetos} color="#27ae60" label={"Netos — "+Math.max(0,instMes-bajasMes)+" de "+objNetos}
              sublabel={semaforoNetos+" Ritmo esperado: "+ritmoNetos+" · "+(diffNetos>=0?"adelantado "+diffNetos:"atrasado "+Math.abs(diffNetos))+" · Altas "+instMes+" - Bajas "+bajasMes}/>
          </>);
        })()}
        <div style={{marginTop:12,padding:"10px 14px",background:"#f4f7fb",borderRadius:10}}>
          <div style={{fontSize:11,fontWeight:700,color:"#6b7a99",textTransform:"uppercase",letterSpacing:".4px",marginBottom:8}}>Objetivos anuales 2026</div>
          <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
            {["Altas","Bajas","Netos"].map(k=>(
              <div key={k} style={{textAlign:"center"}}>
                <div style={{fontSize:18,fontWeight:700,color:k==="Altas"?"#1F3864":k==="Bajas"?"#e74c3c":"#27ae60"}}>{OBJETIVOS_2026[k].reduce((a,b)=>a+b,0)}</div>
                <div style={{fontSize:10,color:"#6b7a99"}}>{k} anuales</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{marginTop:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"#6b7a99",textTransform:"uppercase",letterSpacing:".4px",marginBottom:8}}>Objetivos mensuales 2026</div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:600}}>
              <thead>
                <tr style={{background:"#1F3864",color:"white"}}>
