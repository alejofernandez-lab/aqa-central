",v:c.vendedor||"—"},{l:"Abono s/IVA",v:c.abono>0?fmt(c.abono):"—"},{l:"Deuda",v:fmt(c.deuda)},{l:"FC pendientes",v:c.fc},{l:"Mensualidades",v:c.mens},{l:"Asesor At. Cliente",v:c.asesorAtClte||"—"},{l:"Asesor Cobranzas",v:c.asesorCob||"—"},{l:"Fecha Instalación",v:c.fechaInstalacion||"—"},{l:"Próx. Ajuste",v:c.proxAjuste||"—"},...(c.cartera==="Interior"&&c.localidad?[{l:"Localidad",v:c.localidad}]:[]),...(c.cartera==="Interior"&&c.provincia?[{l:"Provincia",v:c.provincia}]:[])].map(({l,v})=>(<div key={l} style={{background:"#f4f7fb",borderRadius:8,padding:"7px 10px"}}><p style={{margin:0,fontSize:10,color:"#6b7a99"}}>{l}</p><p style={{margin:0,fontSize:13,fontWeight:500}}>{v}</p></div>))}</div></div>)}</div>);}

  const{user:authUser,isPermitido,loadingAuth,login,logout}=useAuth();
  if(loadingAuth)return <div style={{padding:"3rem",textAlign:"center",color:"#6b7a99",fontSize:14}}>Verificando acceso...</div>;
  if(!authUser)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f4f7fb"}}>
      <div style={{background:"#fff",borderRadius:16,padding:"2.5rem",maxWidth:380,width:"100%",boxShadow:"0 8px 40px rgba(0,0,0,.12)",textAlign:"center"}}>
        <p style={{fontSize:28,marginBottom:8}}>💧</p>
        <p style={{fontSize:20,fontWeight:700,color:"#1F3864",margin:"0 0 4px"}}>AQA · HIELOGIC CENTRAL</p>
        <p style={{fontSize:13,color:"#6b7a99",margin:"0 0 28px"}}>Sistema interno de gestión</p>
        <button onClick={login} style={{width:"100%",background:"#1F3864",color:"white",border:"none",borderRadius:10,padding:"13px",fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Ingresar con Google
        </button>
        <p style={{fontSize:11,color:"#9baabf",marginTop:16}}>Solo para uso interno de AQA · Hielogic</p>
      </div>
    </div>
  );
  if(!isPermitido)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f4f7fb"}}>
      <div style={{background:"#fff",borderRadius:16,padding:"2.5rem",maxWidth:380,width:"100%",boxShadow:"0 8px 40px rgba(0,0,0,.12)",textAlign:"center"}}>
        <p style={{fontSize:28,marginBottom:8}}>⛔</p>
        <p style={{fontSize:18,fontWeight:700,color:"#791F1F",margin:"0 0 8px"}}>Sin acceso</p>
        <p style={{fontSize:13,color:"#6b7a99",margin:"0 0 4px"}}>La cuenta <strong>{authUser.email}</strong></p>
        <p style={{fontSize:13,color:"#6b7a99",margin:"0 0 24px"}}>no tiene permiso para acceder a esta aplicación.</p>
        <button onClick={logout} style={{background:"#f4f7fb",color:"#1a2340",border:"1px solid #dce6f5",borderRadius:10,padding:"10px 24px",fontSize:13,fontWeight:600,cursor:"pointer"}}>Cerrar sesión</button>
      </div>
    </div>
  );
  if(loading)return <div style={{padding:"3rem",textAlign:"center",color:"#6b7a99",fontSize:14}}>Cargando AQA Central...</div>;
  return(<div style={{color:"#1a2340"}}>
    {chatCliente&&<ClienteChat clienteId={chatCliente.id} clienteNombre={chatCliente.nombre} onClose={()=>setChatCliente(null)}/>}
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:"1rem",flexWrap:"wrap",gap:8}}><div><p style={{fontSize:20,fontWeight:600,margin:0}}>AQA · HIELOGIC CENTRAL</p><p style={{fontSize:12,color:"#6b7a99",margin:"2px 0 0"}}>{stats.total} clientes · actualizado {lastUpdate}</p></div><div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}><span style={{background:"#FCEBEB",color:"#791F1F",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:500}}>{stats.inhab} inhabilitados</span><span style={{background:"#FAEEDA",color:"#633806",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:500}}>{stats.pend} fc. pendientes</span><span style={{background:"#EAF3DE",color:"#27500A",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:500}}>{stats.hab} habilitados</span><button onClick={logout} title={authUser?.email} style={{background:"#f4f7fb",color:"#6b7a99",border:"1px solid #dce6f5",borderRadius:8,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>↩ {authUser?.email?.split("@")[0]}</button></div></div>
    <TabBar tabs={MAIN_TABS} active={tab} onChange={t=>{setTab(t);setQ("");}}/>

    {tab==="Atención al Cliente"&&(<div><div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap",alignItems:"flex-end"}}><input placeholder="Buscar nombre, ID, asesor, razón social..." value={q} onChange={e=>setQ(e.target.value)} style={{...SS,flex:1,minWidth:160}}/><div style={{display:"flex",flexDirection:"column",gap:2}}><label style={{fontSize:10,fontWeight:600,color:"#6b7a99",textTransform:"uppercase",letterSpacing:"0.4px",paddingLeft:2}}>Tipo</label><select value={logHoja} onChange={e=>setLogHoja(e.target.value)} style={SS}>{LOG_HOJAS.map(o=><option key={o}>{o}</option>)}</select></div><div style={{display:"flex",flexDirection:"column",gap:2}}><label style={{fontSize:10,fontWeight:600,color:"#6b7a99",textTransform:"uppercase",letterSpacing:"0.4px",paddingLeft:2}}>Clasificación</label><select value={logCartera} onChange={e=>setLogCartera(e.target.value)} style={SS}><option value="Todos">Todos</option>{["Buenos Aires","Interior","Hielogic","AQA Office"].map(o=><option key={o}>{o}</option>)}</select></div><div style={{display:"flex",flexDirection:"column",gap:2}}><label style={{fontSize:10,fontWeight:600,color:"#6b7a99",textTransform:"uppercase",letterSpacing:"0.4px",paddingLeft:2}}>Asesor</label><select value={fAtClte} onChange={e=>setFAtClte(e.target.value)} style={SS}><option value="Todos">Todos</option>{ASESORES_ATCLTE.map(o=><option key={o}>{o}</option>)}</select></div><div style={{display:"flex",flexDirection:"column",gap:2}}><label style={{fontSize:10,fontWeight:600,color:"#6b7a99",textTransform:"uppercase",letterSpacing:"0.4px",paddingLeft:2}}>Ordenar por</label><select value={sortAtClte} onChange={e=>setSortAtClte(e.target.value)} style={SS}><option value="nombre_az">Nombre A→Z</option><option value="nombre_za">Nombre Z→A</option><option value="estado_asc">Estado (Hab. primero)</option><option value="estado_desc">Estado (Inhab. primero)</option><option value="deuda_desc">Deuda mayor→menor</option><option value="deuda_asc">Deuda menor→mayor</option><option value="abono_desc">Abono mayor→menor</option><option value="abono_asc">Abono menor→mayor</option><option value="fecha_desc">Instalación más reciente</option><option value="fecha_asc">Instalación más antigua</option></select></div></div>{logHoja!=="Comodato"?loadingLog?<div style={{padding:"2rem",textAlign:"center",fontSize:13,color:"#6b7a99"}}>Cargando...</div>:<div><p style={{fontSize:11,color:"#6b7a99",margin:"0 0 8px"}}>{currentLogData.rows.length} registros · {logCartera==="Todos"?"Todas las carteras":logCartera} · {logHoja}</p><GenericTable data={currentLogData} headerBg="#1F3864"/></div>:<div><p style={{fontSize:11,color:"#6b7a99",margin:"0 0 8px"}}>{filteredAtClte.length} de {clientes.length}</p><div style={{display:"flex",flexDirection:"column",gap:5}}>{filteredAtClte.map((c,i)=><ClienteCard key={c.id+i} c={c}/>)}</div></div>}</div>)}

    {tab==="Cobranzas"&&(<div>
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap",alignItems:"flex-end"}}><input placeholder="Buscar nombre, ID, cobrador, razón social..." value={q} onChange={e=>setQ(e.target.value)} style={{...SS,flex:1,minWidth:160}}/><div style={{display:"flex",flexDirection:"column",gap:2}}><label style={{fontSize:10,fontWeight:600,color:"#6b7a99",textTransform:"uppercase",letterSpacing:"0.4px",paddingLeft:2}}>Plaza</label><select value={fPlaza} onChange={e=>setFPlaza(e.target.value)} style={SS}><option value="Todas">Todas</option><option value="Buenos Aires">Buenos Aires</option><option value="Interior">Interior</option><option value="Hielogic">Hielogic</option></select></div><div style={{display:"flex",flexDirection:"column",gap:2}}><label style={{fontSize:10,fontWeight:600,color:"#6b7a99",textTransform:"uppercase",letterSpacing:"0.4px",paddingLeft:2}}>Estado</label><select value={fEstado} onChange={e=>setFEstado(e.target.value)} style={SS}><option value="todos">Todos</option><option value="habilitado">Habilitado</option><option value="pendiente">Fc. Pendientes</option><option value="inhabilitado">Inhabilitado</option></select></div><div style={{display:"flex",flexDirection:"column",gap:2}}><label style={{fontSize:10,fontWeight:600,color:"#6b7a99",textTransform:"uppercase",letterSpacing:"0.4px",paddingLeft:2}}>Asesor</label><select value={fCobrador} onChange={e=>setFCobrador(e.target.value)} style={SS}><option value="Todos">Todos</option>{cobradores.filter(c=>c!=="Todos").map(c=><option key={c}>{c}</option>)}</select></div><div style={{display:"flex",flexDirection:"column",gap:2}}><label style={{fontSize:10,fontWeight:600,color:"#6b7a99",textTransform:"uppercase",letterSpacing:"0.4px",paddingLeft:2}}>Ordenar por</label><select value={sortCob} onChange={e=>setSortCob(e.target.value)} style={SS}><option value="deuda_desc">Deuda mayor→menor</option><option value="deuda_asc">Deuda menor→mayor</option><option value="nombre_az">Nombre A→Z</option><option value="nombre_za">Nombre Z→A</option><option value="estado_desc">Estado (Inhab. primero)</option><option value="estado_asc">Estado (Hab. primero)</option><option value="abono_desc">Abono mayor→menor</option><option value="abono_asc">Abono menor→mayor</option><option value="fecha_desc">Instalación más reciente</option><option value="fecha_asc">Instalación más antigua</option></select></div></div>
      {(()=>{const clientesConAbono=filteredCob.filter(c=>(parseFloat(c.abono)||0)>0);const deudaPorCliente={};filteredCob.forEach(c=>{const k=c.nombre.trim().toLowerCase();const d=c.deuda>0?c.deuda:0;if(!deudaPorCliente[k]||d>deudaPorCliente[k])deudaPorCliente[k]=d;});const deudaFiltrada=Object.values(deudaPorCliente).reduce((s,d)=>s+d,0);const facturacionFiltrada=clientesConAbono.reduce((s,c)=>s+Math.round(parseFloat(c.abono))*1.21,0);const promedio=clientesConAbono.length>0?clientesConAbono.reduce((s,c)=>s+(parseFloat(c.abono)||0),0)/clientesConAbono.length:0;const hayFiltro=fPlaza!=="Todas"||fEstado!=="todos"||fCobrador!=="Todos";return(<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:12}}><div style={{background:"#f4f7fb",borderRadius:12,padding:"1rem",border:"1px solid #dce6f5"}}><p style={{margin:"0 0 4px",fontSize:12,color:"#6b7a99"}}>Deuda total{hayFiltro?" (filtrada)":""}</p><p style={{margin:0,fontSize:22,fontWeight:600,color:"#791F1F"}}>{fmt(deudaFiltrada)}</p><p style={{margin:"4px 0 0",fontSize:11,color:"#6b7a99"}}>mostrando {filteredCob.length} de {clientesEfectivos.length} clientes</p></div><div style={{background:"#f4f7fb",borderRadius:12,padding:"1rem",border:"1px solid #dce6f5"}}><p style={{margin:"0 0 4px",fontSize:12,color:"#6b7a99"}}>Facturación del mes c/IVA{hayFiltro?" (filtrada)":""}</p><p style={{margin:0,fontSize:22,fontWeight:600,color:"#1F3864"}}>{fmt(facturacionFiltrada)}</p><p style={{margin:"4px 0 0",fontSize:11,color:"#6b7a99"}}>{clientesConAbono.length} clientes con abono</p></div><div style={{background:"#f4f7fb",borderRadius:12,padding:"1rem",border:"1px solid #dce6f5"}}><p style={{margin:"0 0 4px",fontSize:12,color:"#6b7a99"}}>Abono promedio s/IVA{hayFiltro?" (filtrado)":""}</p><p style={{margin:0,fontSize:22,fontWeight:600,color:"#1a5c3a"}}>{promedio>0?fmt(promedio):"—"}</p><p style={{margin:"4px 0 0",fontSize:11,color:"#6b7a99"}}>sobre {clientesConAbono.length} clientes activos</p></div></div>);})()}
      <p style={{fontSize:12,fontWeight:600,color:"#6b7a99",margin:"0 0 8px",textTransform:"uppercase",letterSpacing:"0.5px"}}>Detalle por cliente</p>
      <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:20}}>{filteredCob.map((c,i)=><ClienteCard key={c.id+i} c={c}/>)}</div>
      <p style={{fontSize:12,fontWeight:600,color:"#6b7a99",margin:"0 0 8px",textTransform:"uppercase",letterSpacing:"0.5px"}}>Resumen por asesor</p>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>{resumen.map(r=>(<div key={r.cob} style={{background:"#fff",border:"1px solid #dce6f5",borderRadius:12,padding:"12px 16px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><p style={{margin:0,fontSize:14,fontWeight:500}}>{r.cob}</p><p style={{margin:0,fontSize:13,fontWeight:600,color:"#791F1F"}}>{fmt(r.deuda)}</p></div><div style={{display:"flex",gap:5,flexWrap:"wrap"}}><span style={{background:"#FCEBEB",color:"#791F1F",fontSize:11,padding:"2px 8px",borderRadius:6}}>{r.inhabilitado||0} inhab.</span><span style={{background:"#FAEEDA",color:"#633806",fontSize:11,padding:"2px 8px",borderRadius:6}}>{r.pendiente||0} pend.</span><span style={{background:"#EAF3DE",color:"#27500A",fontSize:11,padding:"2px 8px",borderRadius:6}}>{r.habilitado||0} hab.</span><span style={{background:"#f4f7fb",color:"#6b7a99",fontSize:11,padding:"2px 8px",borderRadius:6}}>{r.total} total</span></div></div>))}</div>
    </div>)}

    {tab==="Comercial"&&<Comercial onNuevoCierre={()=>{}}/>}
    {tab==="Resumen"&&<Resumen clientes={clientesEfectivos} cierres={cierresApp} desins={desinsApp} asesorOverride={asesorOverride}/>}

    {tab==="Logística"&&<Logistica/>}

    {tab==="Administración"&&(<div>
      <TabBar tabs={ADM_TABS} active={admTab} onChange={setAdmTab} color="#1F3864"/>
      {admTab==="Generador de Contratos"&&<GeneradorContratos/>}
      {["Intimaciones","Cartas Documento","Veraz"].includes(admTab)&&(loadingAdm?<div style={{padding:"2rem",textAlign:"center",fontSize:13,color:"#6b7a99"}}>Cargando...</div>:<div>{admData[admTab]?(<div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><span style={{background:ADM_COLORS[admTab]+"22",color:ADM_COLORS[admTab],borderRadius:8,padding:"4px 12px",fontSize:12,fontWeight:500}}>{(admData[admTab].rows||[]).length} registros · {admTab}</span><button onClick={()=>setAdmData(p=>{const n={...p};delete n[admTab];return n;})} style={{fontSize:11,padding:"4px 12px",borderRadius:8,border:"1px solid #dce6f5",cursor:"pointer",background:"transparent",color:"#6b7a99"}}>↻ Actualizar</button></div><GenericTable data={admData[admTab]} headerBg={ADM_COLORS[admTab]}/></div>):<div style={{padding:"2rem",textAlign:"center",fontSize:13,color:"#6b7a99"}}>Sin datos</div>}</div>)}
      {admTab==="Score Crediticio"&&(<div><TabBar tabs={["Buenos Aires","Interior","Hielogic"]} active={scoreTab} onChange={setScoreTab} color="#1a5c3a"/>{loadingAdm?<div style={{padding:"2rem",textAlign:"center",fontSize:13,color:"#6b7a99"}}>Cargando...</div>:<div>{admData["Score Crediticio"]?.[scoreTab]?(<div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><span style={{background:"#e6f7f1",color:"#1a5c3a",borderRadius:8,padding:"4px 12px",fontSize:12,fontWeight:500}}>{(admData["Score Crediticio"][scoreTab].rows||[]).length} clientes · {scoreTab}</span><button onClick={()=>setAdmData(p=>{const n={...p};delete n["Score Crediticio"];return n;})} style={{fontSize:11,padding:"4px 12px",borderRadius:8,border:"1px solid #dce6f5",cursor:"pointer",background:"transparent",color:"#6b7a99"}}>↻ Actualizar</button></div><ScoreTable data={admData["Score Crediticio"][scoreTab]}/></div>):<div style={{padding:"2rem",textAlign:"center",fontSize:13,color:"#6b7a99"}}>Sin datos</div>}</div>}</div>)}
    </div>)}
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
