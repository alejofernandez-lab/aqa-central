// ── Firebase hook ─────────────────────────────────────────────────────
function useFirebase() {
  const [fb, setFb] = useState(window._firebase || null);
  useEffect(() => {
    if (window._firebase) { setFb(window._firebase); return; }
    const handler = () => setFb(window._firebase);
    window.addEventListener("firebase-ready", handler);
    return () => window.removeEventListener("firebase-ready", handler);
  }, []);
  return fb;
}

// ── Chat de cliente (Firebase) ────────────────────────────────────────
function ClienteChat({ clienteId, clienteNombre, onClose }) {
  const fb = useFirebase();
  const [mensajes, setMensajes] = useState([]);
  const [equipo, setEquipo] = useState("");
  const [autor, setAutor] = useState("");
  const [texto, setTexto] = useState("");

  const bottomRef = useRef(null);

  useEffect(() => {
    if (!fb) return;
    const { db, collection, query, orderBy, onSnapshot } = fb;
    const q = query(collection(db, `chats/${clienteId}/mensajes`), orderBy("ts", "asc"));
    const unsub = onSnapshot(q, snap => {
      setMensajes(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    });
    return () => unsub();
  }, [fb, clienteId]);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [mensajes]);

  const enviar = async () => {
    if (!equipo || !autor || !texto.trim()) { alert("Completá equipo, autor y mensaje"); return; }
    if (!fb) { alert("Firebase no disponible"); return; }
    setEnviando(true);
    const { db, collection, addDoc } = fb;

      equipo, autor, texto: texto.trim(),
      ts: Date.now(),
      fecha: new Date().toLocaleString("es-AR", {day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"})
    });

  };

// ── Helpers ───────────────────────────────────────────────────────────
function splitLine(line) {
  const cols = []; let cur = "", inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
    else { cur += ch; }
  }
  cols.push(cur.trim());
  return cols;
}

function parseCSVText(text) {
  const norm = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  const logical = [];
  let cur = "", inQ = false;
  for (let i = 0; i < norm.length; i++) {
    const ch = norm[i];
    if (ch === '"') { inQ = !inQ; cur += ch; }
    else if (ch === '\n' && !inQ) { logical.push(cur); cur = ""; }
    else { cur += ch; }
  }
  if (cur) logical.push(cur);
  if (logical.length < 2) return { headers: [], rows: [] };
  const headers = splitLine(logical[0]).map(h => h.replace(/"/g,"").trim()).filter(Boolean);
  const rows = logical.slice(1).map(line => {
    const cols = splitLine(line);
    const row = {};
    headers.forEach((h, i) => { row[h] = (cols[i]||"").replace(/"/g,"").replace(/\n/g," ").trim(); });
    return row;
  }).filter(r => Object.values(r).some(v => v));
  return { headers, rows };
}

function parseNum(s) { return parseFloat((s||"").replace(/[^0-9,-]/g,"").replace(/\./g,"").replace(",",".")) || 0; }

function parseEstado(f, g) {
  const check = s => { const sl=(s||"").toLowerCase(); if(sl.includes("inhabilitado"))return"inhabilitado"; if(sl.includes("facturas")||sl.includes("pendiente"))return"pendiente"; return"habilitado"; };
  const ef=check(f), eg=check(g);
  if(ef==="inhabilitado"||eg==="inhabilitado") return "inhabilitado";
  if(ef==="pendiente"||eg==="pendiente") return "pendiente";
  return "habilitado";
}

function parseCob(text, cartera) {
  const lines = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").trim().split("\n");
  if (lines.length < 2) return [];
  return lines.slice(1).map(line => {
    const c = splitLine(line);
    const [asesorCob,id,modelo,abono,nombre,colF,colG,deudaRaw,fcRaw,mensRaw] = c;
    if (!id?.trim() || !nombre?.trim()) return null;
    return { id:id.trim(), nombre:nombre.trim(), modelo:modelo||"", asesorCob:asesorCob||"",
      abono:parseNum(abono), estado:parseEstado(colF,colG), deuda:parseNum(deudaRaw),
      fc:parseInt(fcRaw)||0, mens:parseInt(mensRaw)||0, cartera,
      asesorAtClte:"", fechaInstalacion:"" };
  }).filter(Boolean);
}

function parseComodato(text, cartera) {
  const lines = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").trim().split("\n");
  if (lines.length < 2) return { map:{}, clientes:[] };
  const map = {}, clientes = [];
  lines.slice(1).forEach(line => {
    const c = splitLine(line);
    const asesor = (c[0]||"").trim();
    const modelo = (c[2]||"").trim();
    const nombre = (c[3]||"").replace(/"/g,"").trim();
    const idPersat = (c[4]||"").trim();
    const fechaIns = (c[8]||"").trim();
    if (idPersat) map[idPersat] = { asesorAtClte:asesor, fechaInstalacion:fechaIns };
    if (nombre && cartera === "AQA Office") {
      clientes.push({ id:idPersat||nombre, nombre, modelo, asesorCob:"—", asesorAtClte:asesor,
        abono:0, estado:"habilitado", deuda:0, fc:0, mens:0, cartera, fechaInstalacion:fechaIns });
    }
  });
  return { map, clientes };
}

const numLetras = n => {
  if(!n||n===0) return "cero";
  const M={1:"uno",2:"dos",3:"tres",4:"cuatro",5:"cinco",6:"seis",7:"siete",8:"ocho",9:"nueve",10:"diez",11:"once",12:"doce",13:"trece",14:"catorce",15:"quince",16:"dieciséis",17:"diecisiete",18:"dieciocho",19:"diecinueve",20:"veinte",21:"veintiún",22:"veintidós",23:"veintitrés",24:"veinticuatro",25:"veinticinco",26:"veintiséis",27:"veintisiete",28:"veintiocho",29:"veintinueve",30:"treinta",40:"cuarenta",50:"cincuenta",60:"sesenta",70:"setenta",80:"ochenta",90:"noventa"};
  if(n<=29) return M[n]||"";
  if(n<100){const d=Math.floor(n/10)*10,u=n%10; return u===0?M[d]:M[d]+" y "+M[u];}
  if(n===100) return "cien";
  if(n<200) return "ciento "+numLetras(n-100);
  const C={200:"doscientos",300:"trescientos",400:"cuatrocientos",500:"quinientos",600:"seiscientos",700:"setecientos",800:"ochocientos",900:"novecientos"};
  const cv=Math.floor(n/100)*100, r=n%100;
  if(n<1000) return r===0?C[cv]:C[cv]+" "+numLetras(r);
  const m2=Math.floor(n/1000), r2=n%1000;
  const ms=m2===1?"mil":numLetras(m2)+" mil";
  return r2===0?ms:ms+" "+numLetras(r2);
};

const CIERRE_VACIO={clasificacion:"",nombreFantasia:"",razonSocial:"",direccion:"",correo:"",contacto:"",modelo:"",valor:"",instalacion:"",insumos:"",contrato:"",ajuste:"",observaciones:"",asesor:"",vendedor:""};

function Comercial({onNuevoCierre}) {
  const fb = useFirebase();
  const [cierres,setCierres]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState(CIERRE_VACIO);
  const [expandedId,setExpandedId]=useState(null);
  const [modalVendedor,setModalVendedor]=useState(false);
  const [modalAsesor,setModalAsesor]=useState(null);
  const [chatCierreId,setChatCierreId]=useState(null);
  const setF=(k,v)=>setForm(p=>({...p,[k]:v}));
  const SS={fontSize:13,padding:"9px 12px",borderRadius:8,border:"1.5px solid #dce6f5",background:"#f4f7fb",color:"#1a2340",outline:"none",width:"100%"};

  useEffect(()=>{
    if(!fb) return;
    const { db, collection, query, orderBy, onSnapshot } = fb;
    const q = query(collection(db,"cierres"), orderBy("ts","desc"));
    const unsub = onSnapshot(q, snap => {
      setCierres(snap.docs.map(d=>({id:d.id,...d.data()})));
      setLoading(false);
    });
    return ()=>unsub();
  },[fb]);

  useEffect(()=>{ if(fb&&loading) setLoading(false); },[fb]);

  const guardar=async()=>{
    if(!form.nombreFantasia||!form.razonSocial){alert("Completá Nombre de Fantasía y Razón Social");return;}
    if(!fb){alert("Firebase no disponible");return;}
    const { db, collection, addDoc } = fb;
    const nuevo = {...form, ts:Date.now(), fecha:new Date().toLocaleDateString("es-AR")};
    const ref = await addDoc(collection(db,"cierres"), nuevo);
    onNuevoCierre({...nuevo, id:ref.id});
    setForm(CIERRE_VACIO); setShowForm(false);
  };

  const asignarAsesor=async(id,a)=>{
    if(!fb) return;
    const { db, doc, setDoc } = fb;
    await setDoc(doc(db,"cierres",id), {asesor:a}, {merge:true});
  };

  const inp=(k,ph,type="text")=><input type={type} value={form[k]} onChange={e=>setF(k,e.target.value)} placeholder={ph} style={SS}/>;
  const sel=(k,opts,ph="Seleccionar...")=><select value={form[k]} onChange={e=>setF(k,e.target.value)} style={{...SS,cursor:"pointer"}}><option value="">{ph}</option>{opts.map(o=><option key={o}>{o}</option>)}</select>;
  const campo=(label,child,full=false)=><div style={{display:"flex",flexDirection:"column",gap:4,gridColumn:full?"1/-1":"auto"}}><label style={{fontSize:11,fontWeight:600,color:"#6b7a99",textTransform:"uppercase",letterSpacing:"0.5px"}}>{label}</label>{child}</div>;

  if(loading||!fb) return <div style={{padding:"2rem",textAlign:"center",fontSize:13,color:"#6b7a99"}}>{!fb?"Conectando a Firebase...":"Cargando cierres..."}</div>;

  return (
    <div>
      {modalVendedor&&<ModalLista titulo="Seleccionar Vendedor" items={VENDEDORES} onSelect={v=>setF("vendedor",v)} onClose={()=>setModalVendedor(false)}/>}
      {modalAsesor&&<ModalLista titulo="Asignar Asesor At. Cliente" items={ASESORES_ATCLTE} onSelect={a=>asignarAsesor(modalAsesor,a)} onClose={()=>setModalAsesor(null)}/>}
      {chatCierreId&&(() => {
        const c = cierres.find(x=>x.id===chatCierreId);
        return c ? <ClienteChat clienteId={`cierre_${chatCierreId}`} clienteNombre={c.nombreFantasia} onClose={()=>setChatCierreId(null)}/> : null;
      })()}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div>
          <p style={{margin:0,fontSize:14,fontWeight:600}}>Comercial</p>
          <p style={{margin:0,fontSize:12,color:"#6b7a99"}}>{cierres.length} cierres · tiempo real 🟢</p>
        </div>
        <button onClick={()=>setShowForm(p=>!p)} style={{background:"#1F3864",color:"white",border:"none",borderRadius:10,padding:"9px 18px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
          {showForm?"✕ Cancelar":"+ Nuevo Cierre"}
        </button>
      </div>

      {showForm&&(
        <div style={{border:"1.5px solid #2E75B6",borderRadius:14,overflow:"hidden",marginBottom:16}}>
          <div style={{background:"#1F3864",padding:"12px 16px"}}><p style={{margin:0,color:"white",fontSize:14,fontWeight:600}}>Nuevo Cierre</p></div>
          <div style={{padding:"16px",background:"#fff"}}>
            <p style={{margin:"0 0 10px",fontSize:12,fontWeight:600,color:"#6b7a99",textTransform:"uppercase"}}>📋 Datos del Cliente</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              {campo("Clasificación",sel("clasificacion",CLASIFICACIONES))}
              {campo("Vendedor",
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <div style={{flex:1,padding:"9px 12px",borderRadius:8,border:"1.5px solid #dce6f5",background:"#f4f7fb",fontSize:13,color:form.vendedor?"#1a2340":"#9baabf",minHeight:38}}>{form.vendedor||"Sin seleccionar"}</div>
                  <button onClick={()=>setModalVendedor(true)} style={{background:"#1F3864",color:"white",border:"none",borderRadius:8,padding:"9px 14px",fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>Elegir</button>
                </div>
              )}
              {campo("Nombre de Fantasía",inp("nombreFantasia","Ej: LOI SUITES"),true)}
              {campo("Razón Social",inp("razonSocial","Ej: LOITEGUI SA"),true)}
              {campo("Dirección",inp("direccion","Dirección de instalación"),true)}
              {campo("Correo",inp("correo","email@ejemplo.com"))}
              {campo("Contacto",inp("contacto","Nombre - Cargo - Tel"))}
            </div>
            <p style={{margin:"0 0 10px",fontSize:12,fontWeight:600,color:"#6b7a99",textTransform:"uppercase"}}>💧 Condiciones Comerciales</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              {campo("Modelo AQA",sel("modelo",MODELOS_ALL))}
              {campo("Valor / Acuerdo",inp("valor","Ej: $350.000"))}
              {campo("Instalación",inp("instalacion","Ej: Bonificada 100%"))}
              {campo("Insumos",inp("insumos","Ej: 200 botellas"))}
              {campo("Contrato",inp("contrato","Ej: 24 meses"))}
              {campo("Ajuste",sel("ajuste",AJUSTES))}
              {campo("Observaciones",<textarea value={form.observaciones} onChange={e=>setF("observaciones",e.target.value)} rows={2} style={{...SS,resize:"vertical"}}/>,true)}
            </div>
            <p style={{margin:"0 0 6px",fontSize:11,color:"#9baabf"}}>El asesor de Atención al Cliente se asigna después desde cada cierre.</p>
            <button onClick={guardar} style={{width:"100%",background:"#1a5c3a",color:"white",border:"none",borderRadius:10,padding:"13px",fontSize:14,fontWeight:600,cursor:"pointer",marginTop:8}}>✔ Guardar Cierre</button>
          </div>
        </div>
      )}

      {cierres.length===0&&!showForm&&(
        <div style={{background:"#f4f7fb",borderRadius:12,padding:"2rem",textAlign:"center",border:"1px solid #dce6f5"}}>
          <p style={{margin:0,fontSize:13,color:"#6b7a99"}}>No hay cierres. Hacé clic en "+ Nuevo Cierre"</p>
        </div>
      )}

      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {cierres.map(c=>{
          const open=expandedId===c.id;
          const sinAsesor=!c.asesor;
          return (
            <div key={c.id} style={{background:"#fff",border:"1px solid #dce6f5",borderRadius:12,overflow:"hidden",borderLeft:`3px solid ${sinAsesor?"#EF9F27":"#2E75B6"}`}}>
              <div onClick={()=>setExpandedId(open?null:c.id)} style={{padding:"12px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                <div style={{minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <p style={{margin:0,fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.nombreFantasia}</p>
                    {sinAsesor&&<span style={{background:"#FAEEDA",color:"#633806",fontSize:10,padding:"1px 7px",borderRadius:5,fontWeight:500,whiteSpace:"nowrap"}}>Sin asesor</span>}
                  </div>
                  <p style={{margin:0,fontSize:11,color:"#6b7a99"}}>{c.razonSocial} · {c.vendedor||"Sin vendedor"} · {c.modelo||"Modelo a definir"}</p>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                  <button onClick={e=>{e.stopPropagation();setChatCierreId(c.id);}} style={{background:"#e8f1fb",color:"#1F3864",border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",fontWeight:500}}>💬 Chat</button>
                  <span style={{background:"#e8f1fb",color:"#1F3864",fontSize:11,padding:"2px 8px",borderRadius:6,fontWeight:500}}>{c.fecha}</span>
                  <span style={{fontSize:11,color:"#6b7a99"}}>{open?"▲":"▼"}</span>
                </div>
              </div>
              {open&&(
                <div style={{padding:"0 14px 14px",borderTop:"1px solid #dce6f5"}}>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:8,marginTop:10}}>
                    {[{l:"Clasificación",v:c.clasificacion},{l:"Vendedor",v:c.vendedor},{l:"Dirección",v:c.direccion},{l:"Correo",v:c.correo},{l:"Contacto",v:c.contacto},{l:"Modelo",v:c.modelo},{l:"Valor",v:c.valor},{l:"Instalación",v:c.instalacion},{l:"Insumos",v:c.insumos},{l:"Contrato",v:c.contrato},{l:"Ajuste",v:c.ajuste}].filter(x=>x.v).map(({l,v})=>(
                      <div key={l} style={{background:"#f4f7fb",borderRadius:8,padding:"7px 10px"}}>
                        <p style={{margin:0,fontSize:10,color:"#6b7a99"}}>{l}</p>
                        <p style={{margin:0,fontSize:12,fontWeight:500}}>{v}</p>
                      </div>
                    ))}
                    <div style={{background:sinAsesor?"#fffbe6":"#f4f7fb",borderRadius:8,padding:"7px 10px",border:sinAsesor?"1px solid #f0d060":"none"}}>
                      <p style={{margin:0,fontSize:10,color:"#6b7a99"}}>Asesor At. Cliente</p>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}>
                        <p style={{margin:0,fontSize:12,fontWeight:500}}>{c.asesor||"Sin asignar"}</p>
                        <button onClick={()=>setModalAsesor(c.id)} style={{fontSize:10,padding:"2px 8px",borderRadius:5,border:"1px solid #1F3864",background:"transparent",color:"#1F3864",cursor:"pointer"}}>{c.asesor?"Cambiar":"Asignar"}</button>
                      </div>
                    </div>
                  </div>
                  {c.observaciones&&(
                    <div style={{background:"#fffbe6",borderRadius:8,padding:"7px 10px",border:"1px solid #f0d060",marginTop:8}}>
                      <p style={{margin:0,fontSize:10,color:"#856404"}}>Observaciones iniciales</p>
                      <p style={{margin:0,fontSize:12,fontWeight:500}}>{c.observaciones}</p>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── App Principal ─────────────────────────────────────────────────────
function App() {
  const [clientes,setClientes]=useState([]);
  const [loading,setLoading]=useState(true);
  const [lastUpdate,setLastUpdate]=useState("");
  const [tab,setTab]=useState("Atención al Cliente");
  const [admTab,setAdmTab]=useState("Generador de Contratos");
  const [scoreTab,setScoreTab]=useState("Buenos Aires");
  const [logHoja,setLogHoja]=useState("Comodato");
  const [logCartera,setLogCartera]=useState("Todos");
  const [logData,setLogData]=useState({});
  const [loadingLog,setLoadingLog]=useState(false);
  const [admData,setAdmData]=useState({});
  const [loadingAdm,setLoadingAdm]=useState(false);
  const [q,setQ]=useState("");
  const [fEstado,setFEstado]=useState("todos");
  const [fCobrador,setFCobrador]=useState("Todos");
  const [fAtClte,setFAtClte]=useState("Todos");
  const [expanded,setExpanded]=useState(null);
  const [instPendExtra,setInstPendExtra]=useState([]);
  const [chatCliente,setChatCliente]=useState(null); // {id, nombre}

  useEffect(()=>{
    (async()=>{
      try {
        const [rCobBsAs,rCobInt,rCobHiel,rComBsAs,rComInt,rComHiel,rComOff]=await Promise.all([
          safeFetch(URLS.cobBsAs),safeFetch(URLS.cobInt),safeFetch(URLS.cobHiel),
          safeFetch(URLS.baComodato),safeFetch(URLS.intComodato),safeFetch(URLS.hielComodato),safeFetch(URLS.offComodato),
        ]);
        const {map:m1}=parseComodato(rComBsAs,"Buenos Aires");
        const {map:m2}=parseComodato(rComInt,"Interior");
        const {map:m3}=parseComodato(rComHiel,"Hielogic");
        const {map:m4,clientes:offClientes}=parseComodato(rComOff,"AQA Office");
        const cmap={...m1,...m2,...m3,...m4};
        const enrich=(text,cartera)=>parseCob(text,cartera).map(c=>{const x=cmap[c.id]||{};return{...c,asesorAtClte:x.asesorAtClte||"",fechaInstalacion:x.fechaInstalacion||""};});
        const all=[...enrich(rCobBsAs,"Buenos Aires"),...enrich(rCobInt,"Interior"),...enrich(rCobHiel,"Hielogic"),...offClientes];
        if(all.length>0) setClientes(all);
      } catch(e){console.error(e);}
      setLastUpdate(new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"}));
      setLoading(false);
    })();
  },[]);

  useEffect(()=>{
    if(tab!=="Atención al Cliente"||logHoja==="Comodato") return;
    const carteras=logCartera==="Todos"?["Buenos Aires","Interior","Hielogic","AQA Office"]:[logCartera];
    carteras.forEach(c=>{
      const key=`${c}_${logHoja}`;
      if(logData[key]) return;
      const urlKey=LOG_URL_MAP[key];
      if(!urlKey) return;
      setLoadingLog(true);
      safeFetch(URLS[urlKey]).then(r=>{
        setLogData(p=>({...p,[key]:parseCSVText(r)}));
        setLoadingLog(false);
      }).catch(()=>{
        setLogData(p=>({...p,[key]:{headers:["Error"],rows:[]}}));
        setLoadingLog(false);
      });
    });
  },[tab,logCartera,logHoja]);

  useEffect(()=>{
    if(tab!=="Administración"||admTab==="Generador de Contratos") return;
    if(admData[admTab]) return;
    setLoadingAdm(true);
    (async()=>{
      try {
        if(admTab==="Score Crediticio"){
          const [r1,r2,r3]=await Promise.all([safeFetch(URLS.scoreBsAs),safeFetch(URLS.scoreInt),safeFetch(URLS.scoreHiel)]);
          setAdmData(p=>({...p,"Score Crediticio":{"Buenos Aires":parseCSVText(r1),"Interior":parseCSVText(r2),"Hielogic":parseCSVText(r3)}}));
        } else {
          const urlMap={"Intimaciones":URLS.intimaciones,"Cartas Documento":URLS.cartasDoc,"Veraz":URLS.veraz};
          const r=await safeFetch(urlMap[admTab]);
          setAdmData(p=>({...p,[admTab]:parseCSVText(r)}));
        }
      } catch { setAdmData(p=>({...p,[admTab]:{headers:["Error al cargar"],rows:[]}})); }
      setLoadingAdm(false);
    })();
  },[tab,admTab]);

  const handleNuevoCierre=c=>{
    setInstPendExtra(p=>[{Asesor:c.asesor||"Sin asignar",Vendedor:c.vendedor||"—",Modelo:c.modelo||"A Definir",["Nombre de Fantasía - Sucursal"]:c.nombreFantasia,Solicitud:c.fecha,Documentación:"",Relevo:"",Estado:"Pendiente",Instalación:"",Área:"At. Cliente",Observaciones:c.observaciones||""},...p]);
  };

  const cobradores=useMemo(()=>["Todos",...new Set(clientes.map(c=>c.asesorCob).filter(Boolean))]  ,[clientes]);
  const stats=useMemo(()=>({total:clientes.length,inhab:clientes.filter(c=>c.estado==="inhabilitado").length,pend:clientes.filter(c=>c.estado==="pendiente").length,hab:clientes.filter(c=>c.estado==="habilitado").length,deudaTotal:clientes.reduce((s,c)=>s+(c.deuda>0?c.deuda:0),0)}),[clientes]);
  const filteredAtClte=useMemo(()=>clientes.filter(c=>{const sq=q.toLowerCase();return(c.nombre.toLowerCase().includes(sq)||c.id.includes(sq)||(c.asesorAtClte||"").toLowerCase().includes(sq))&&(fAtClte==="Todos"||c.asesorAtClte===fAtClte)&&(logCartera==="Todos"||c.cartera===logCartera);}),[clientes,q,fAtClte,logCartera]);
  const filteredCob=useMemo(()=>clientes.filter(c=>{const sq=q.toLowerCase();return(c.nombre.toLowerCase().includes(sq)||c.id.includes(sq)||(c.asesorCob||"").toLowerCase().includes(sq))&&(fEstado==="todos"||c.estado===fEstado)&&(fCobrador==="Todos"||c.asesorCob===fCobrador);}),[clientes,q,fEstado,fCobrador]);
  const resumen=useMemo(()=>{const r={};clientes.forEach(c=>{const k=c.asesorCob||"Sin asignar";if(!r[k])r[k]={cob:k,total:0,inhabilitado:0,pendiente:0,habilitado:0,deuda:0};r[k].total++;r[k][c.estado]=(r[k][c.estado]||0)+1;if(c.deuda>0)r[k].deuda+=c.deuda;});return Object.values(r).sort((a,b)=>b.deuda-a.deuda);},[clientes]);
  const currentLogData=useMemo(()=>{
    if(logHoja==="Comodato") return null;
    const carteras=logCartera==="Todos"?["Buenos Aires","Interior","Hielogic","AQA Office"]:[logCartera];
    let headers=[];const rows=[];
    carteras.forEach(c=>{
      const key=`${c}_${logHoja}`;const d=logData[key];
      if(d&&d.headers&&d.headers.length>0){
        if(headers.length===0) headers=d.headers;
        const fil=fAtClte==="Todos"?d.rows:d.rows.filter(r=>(r[d.headers[0]]||"").toLowerCase().includes(fAtClte.toLowerCase()));
        rows.push(...fil);
      }
    });
    return {headers,rows};
  },[logData,logHoja,logCartera,fAtClte]);

  const SS={fontSize:13,padding:"8px 10px",borderRadius:8,border:"1px solid #dce6f5",background:"#fff",color:"#1a2340",outline:"none"};

  function ClienteCard({c}) {
    const av=avColor(c.asesorAtClte||c.asesorCob);
    const open=expanded?.id===c.id&&expanded?.n===c.nombre;
    const chatId = `cliente_${c.id}`;
    return (
      <div style={{background:"#fff",border:"1px solid #dce6f5",borderRadius:12,overflow:"hidden",borderLeft:`3px solid ${BCOL[c.estado]||"#ccc"}`}}>
        <div onClick={()=>setExpanded(open?null:{id:c.id,n:c.nombre})} style={{padding:"10px 14px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:av.bg,color:av.c,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,flexShrink:0}}>{initials(c.asesorAtClte||c.asesorCob)}</div>
            <div style={{minWidth:0}}>
              <p style={{margin:0,fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.nombre}</p>
              <p style={{margin:0,fontSize:11,color:"#6b7a99"}}>ID {c.id} · {c.modelo} · {c.cartera}</p>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            <button onClick={e=>{e.stopPropagation();setChatCliente({id:chatId,nombre:c.nombre});}} style={{background:"#e8f1fb",color:"#1F3864",border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",fontWeight:500}}>💬</button>
            <Badge estado={c.estado}/>
            <span style={{fontSize:11,color:c.deuda>500000?"#791F1F":c.deuda>0?"#633806":"#6b7a99",fontWeight:c.deuda>500000?600:400,whiteSpace:"nowrap"}}>{fmt(c.deuda)}</span>
          </div>
        </div>
        {open&&(
          <div style={{padding:"0 14px 12px",borderTop:"1px solid #dce6f5"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:6,marginTop:10}}>
              {[{l:"Modelo",v:c.modelo||"—"},{l:"Abono s/IVA",v:c.abono>0?fmt(c.abono):"—"},{l:"Deuda",v:fmt(c.deuda)},{l:"FC pendientes",v:c.fc},{l:"Mensualidades",v:c.mens},{l:"Asesor At. Cliente",v:c.asesorAtClte||"—"},{l:"Asesor Cobranzas",v:c.asesorCob||"—"},{l:"Fecha Instalación",v:c.fechaInstalacion||"—"}].map(({l,v})=>(
                <div key={l} style={{background:"#f4f7fb",borderRadius:8,padding:"7px 10px"}}>
                  <p style={{margin:0,fontSize:10,color:"#6b7a99"}}>{l}</p>
                  <p style={{margin:0,fontSize:13,fontWeight:500}}>{v}</p>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    );
  }

  if(loading) return <div style={{padding:"3rem",textAlign:"center",color:"#6b7a99",fontSize:14}}>Cargando AQA Central...</div>;

  return (
    <div style={{color:"#1a2340"}}>
      {chatCliente&&<ClienteChat clienteId={chatCliente.id} clienteNombre={chatCliente.nombre} onClose={()=>setChatCliente(null)}/>}

      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:"1rem",flexWrap:"wrap",gap:8}}>
        <div>
          <p style={{fontSize:20,fontWeight:600,margin:0}}>AQA Central</p>
          <p style={{fontSize:12,color:"#6b7a99",margin:"2px 0 0"}}>{stats.total} clientes · actualizado {lastUpdate}</p>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          <span style={{background:"#FCEBEB",color:"#791F1F",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:500}}>{stats.inhab} inhabilitados</span>
          <span style={{background:"#FAEEDA",color:"#633806",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:500}}>{stats.pend} fc. pendientes</span>
          <span style={{background:"#EAF3DE",color:"#27500A",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:500}}>{stats.hab} habilitados</span>
        </div>
      </div>

      <TabBar tabs={MAIN_TABS} active={tab} onChange={t=>{setTab(t);setQ("");}}/>

      {/* Atención al Cliente */}
      {tab==="Atención al Cliente"&&(
        <div>
          <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
            <input placeholder="Buscar nombre, ID, asesor..." value={q} onChange={e=>setQ(e.target.value)} style={{...SS,flex:1,minWidth:160}}/>
            <select value={logHoja} onChange={e=>setLogHoja(e.target.value)} style={SS}>{LOG_HOJAS.map(o=><option key={o}>{o}</option>)}</select>
            <select value={logCartera} onChange={e=>setLogCartera(e.target.value)} style={SS}>{["Todos","Buenos Aires","Interior","Hielogic","AQA Office"].map(o=><option key={o}>{o}</option>)}</select>
            <select value={fAtClte} onChange={e=>setFAtClte(e.target.value)} style={SS}>{["Todos",...ASESORES_ATCLTE].map(o=><option key={o}>{o}</option>)}</select>
          </div>
          {logHoja!=="Comodato"&&(
            loadingLog
              ? <div style={{padding:"2rem",textAlign:"center",fontSize:13,color:"#6b7a99"}}>Cargando...</div>
              : currentLogData&&<div>
                  <p style={{fontSize:11,color:"#6b7a99",margin:"0 0 8px"}}>{currentLogData.rows.length} registros · {logCartera==="Todos"?"Todas las carteras":logCartera} · {logHoja}</p>
                  <GenericTable data={currentLogData} headerBg="#1F3864"/>
                </div>
          )}
          {logHoja==="Comodato"&&(
            <div>
              <p style={{fontSize:11,color:"#6b7a99",margin:"0 0 8px"}}>{filteredAtClte.length} de {clientes.length}</p>
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                {filteredAtClte.map((c,i)=><ClienteCard key={c.id+i} c={c}/>)}
              </div>
            </div>
          )}
        </div>
      )}

      {/* Cobranzas */}
      {tab==="Cobranzas"&&(
        <div>
          <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
            <input placeholder="Buscar nombre, ID, cobrador..." value={q} onChange={e=>setQ(e.target.value)} style={{...SS,flex:1,minWidth:160}}/>
            <select value={fEstado} onChange={e=>setFEstado(e.target.value)} style={SS}>
              <option value="todos">Todos los estados</option>
              <option value="habilitado">Habilitado</option>
              <option value="pendiente">Fc. Pendientes</option>
              <option value="inhabilitado">Inhabilitado</option>
            </select>
            <select value={fCobrador} onChange={e=>setFCobrador(e.target.value)} style={SS}>{cobradores.map(c=><option key={c}>{c}</option>)}</select>
          </div>
          <div style={{background:"#f4f7fb",borderRadius:12,padding:"1rem",border:"1px solid #dce6f5",marginBottom:12}}>
            <p style={{margin:"0 0 4px",fontSize:12,color:"#6b7a99"}}>Deuda total cartera</p>
            <p style={{margin:0,fontSize:24,fontWeight:600,color:"#791F1F"}}>{fmt(stats.deudaTotal)}</p>
            <p style={{margin:"4px 0 0",fontSize:11,color:"#6b7a99"}}>sobre {stats.total} clientes · mostrando {filteredCob.length}</p>
          </div>
          <p style={{fontSize:12,fontWeight:600,color:"#6b7a99",margin:"0 0 8px",textTransform:"uppercase",letterSpacing:"0.5px"}}>Detalle por cliente</p>
          <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:20}}>
            {filteredCob.map((c,i)=><ClienteCard key={c.id+i} c={c}/>)}
          </div>
          <p style={{fontSize:12,fontWeight:600,color:"#6b7a99",margin:"0 0 8px",textTransform:"uppercase",letterSpacing:"0.5px"}}>Resumen por asesor</p>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {resumen.map(r=>(
              <div key={r.cob} style={{background:"#fff",border:"1px solid #dce6f5",borderRadius:12,padding:"12px 16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <p style={{margin:0,fontSize:14,fontWeight:500}}>{r.cob}</p>
                  <p style={{margin:0,fontSize:13,fontWeight:600,color:"#791F1F"}}>{fmt(r.deuda)}</p>
                </div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                  <span style={{background:"#FCEBEB",color:"#791F1F",fontSize:11,padding:"2px 8px",borderRadius:6}}>{r.inhabilitado||0} inhab.</span>
                  <span style={{background:"#FAEEDA",color:"#633806",fontSize:11,padding:"2px 8px",borderRadius:6}}>{r.pendiente||0} pend.</span>
                  <span style={{background:"#EAF3DE",color:"#27500A",fontSize:11,padding:"2px 8px",borderRadius:6}}>{r.habilitado||0} hab.</span>
                  <span style={{background:"#f4f7fb",color:"#6b7a99",fontSize:11,padding:"2px 8px",borderRadius:6}}>{r.total} total</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab==="Comercial"&&<Comercial onNuevoCierre={handleNuevoCierre}/>}

      {tab==="Logística"&&(
        <div style={{background:"#f4f7fb",borderRadius:12,padding:"1.25rem",border:"1px solid #dce6f5"}}>
          <p style={{margin:"0 0 4px",fontSize:14,fontWeight:500}}>Próximamente</p>
          <p style={{margin:0,fontSize:13,color:"#6b7a99"}}>Pedidos de CO2, botellas, tapas, relevos e instalaciones.</p>
        </div>
      )}

      {tab==="Administración"&&(
        <div>
          <TabBar tabs={ADM_TABS} active={admTab} onChange={setAdmTab} color="#1F3864"/>
          {admTab==="Generador de Contratos"&&<GeneradorContratos/>}
          {["Intimaciones","Cartas Documento","Veraz"].includes(admTab)&&(
            loadingAdm
              ? <div style={{padding:"2rem",textAlign:"center",fontSize:13,color:"#6b7a99"}}>Cargando...</div>
              : admData[admTab]&&(
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <span style={{background:ADM_COLORS[admTab]+"22",color:ADM_COLORS[admTab],borderRadius:8,padding:"4px 12px",fontSize:12,fontWeight:500}}>{(admData[admTab].rows||[]).length} registros · {admTab}</span>
                    <button onClick={()=>setAdmData(p=>{const n={...p};delete n[admTab];return n;})} style={{fontSize:11,padding:"4px 12px",borderRadius:8,border:"1px solid #dce6f5",cursor:"pointer",background:"transparent",color:"#6b7a99"}}>↻ Actualizar</button>
                  </div>
                  <GenericTable data={admData[admTab]} headerBg={ADM_COLORS[admTab]}/>
                </div>
              )
          )}
          {admTab==="Score Crediticio"&&(
            <div>
              <TabBar tabs={["Buenos Aires","Interior","Hielogic"]} active={scoreTab} onChange={setScoreTab} color="#1a5c3a"/>
              {loadingAdm
                ? <div style={{padding:"2rem",textAlign:"center",fontSize:13,color:"#6b7a99"}}>Cargando...</div>
                : admData["Score Crediticio"]?.[scoreTab]&&(
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                      <span style={{background:"#e6f7f1",color:"#1a5c3a",borderRadius:8,padding:"4px 12px",fontSize:12,fontWeight:500}}>{(admData["Score Crediticio"][scoreTab].rows||[]).length} clientes · {scoreTab}</span>
                      <button onClick={()=>setAdmData(p=>{const n={...p};delete n["Score Crediticio"];return n;})} style={{fontSize:11,padding:"4px 12px",borderRadius:8,border:"1px solid #dce6f5",cursor:"pointer",background:"transparent",color:"#6b7a99"}}>↻ Actualizar</button>
                    </div>
                    <ScoreTable data={admData["Score Crediticio"][scoreTab]}/>
                  </div>
                )
              }
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
